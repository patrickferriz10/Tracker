  var d=new Date(today);
  d.setDate(today.getDate()-(today.getDay()-dow));
  return d.toISOString().slice(0,10);
}

function getDayPlan(dow){
  var wkNum = Math.floor((new Date(weekKey()) - new Date('2025-01-06')) / (7*24*3600*1000));
  var plan = wkNum % 2 === 0 ? WEEK_A : WEEK_B;
  var dayKeys = ['dom','lun','mar','mie','jue','vie','sab'];
  return plan[dayKeys[dow]] || plan['lun'];
}

function sbReq(method,path,body){
  return fetch(SB_URL+'/rest/v1/'+path,{
    method:method,
    headers:{
      'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,
      'Content-Type':'application/json',
      'Prefer':method==='POST'?'return=representation,resolution=merge-duplicates':'return=representation'
    },
    body:body?JSON.stringify(body):undefined
  }).then(function(r){return r.status===204?null:r.json();});
}

function fmt(n){return n.toFixed(2).replace('.',',')+' €';}

// ── MEAL LOGS ──────────────────────────────────────────
function loadMeals(){
  setSyncStatus('syncing');
  var dates=[];
  for(var i=0;i<7;i++){var d=new Date(today);d.setDate(today.getDate()-(today.getDay()-i));dates.push(d.toISOString().slice(0,10));}
  return sbReq('GET','meal_logs?date=in.('+dates.join(',')+')'+'&select=*')
    .then(function(rows){
      mealCache={};
      if(Array.isArray(rows)) rows.forEach(function(r){
        if(!mealCache[r.date]) mealCache[r.date]={};
        mealCache[r.date][r.meal]={done:r.done,swapped_to:r.swapped_to,id:r.id};
      });
      setSyncStatus('ok');
    }).catch(function(){setSyncStatus('err');});
}

function saveMeal(dateStr,meal,done,swapped){
  setSyncStatus('syncing');
  if(!mealCache[dateStr]) mealCache[dateStr]={};
  var body={date:dateStr,meal:meal,done:done,swapped_to:swapped||null};
  return sbReq('POST','meal_logs',body).then(function(res){
    var r=Array.isArray(res)?res[0]:res;
    if(r) mealCache[dateStr][meal]={done:r.done,swapped_to:r.swapped_to,id:r.id};
    setSyncStatus('ok');
  }).catch(function(){setSyncStatus('err');});
}

// ── SHOPPING ───────────────────────────────────────────
function loadShop(){
  return sbReq('GET','shopping_items?week_key=eq.'+weekKey()+'&order=created_at.asc&select=*')
    .then(function(rows){ shopCache=Array.isArray(rows)?rows:[]; })
    .catch(function(){});
}

function addShopItem(name,cat){
  var body={name:name,category:cat,checked:false,week_key:weekKey()};
  return sbReq('POST','shopping_items',body).then(function(res){
    var r=Array.isArray(res)?res[0]:res;
    if(r) shopCache.push(r);
    setSyncStatus('ok');
  }).catch(function(){setSyncStatus('err');});
}

function toggleShopItem(id,checked){
  shopCache=shopCache.map(function(i){return i.id===id?Object.assign({},i,{checked:checked}):i;});
  return sbReq('PATCH','shopping_items?id=eq.'+id,{checked:checked}).catch(function(){});
}

function deleteShopItem(id){
  shopCache=shopCache.filter(function(i){return i.id!==id;});
  return sbReq('DELETE','shopping_items?id=eq.'+id).catch(function(){});
}

// ── RENDER PLAN ─────────────────────────────────────────
function renderNav(){
  var nav=document.getElementById('days-nav');
  if(!nav){
    nav=document.createElement('div');
    nav.className='days-nav';
    nav.id='days-nav';
    document.getElementById('view-plan').prepend(nav);
  }
  nav.innerHTML='';
  for(var i=0;i<7;i++){
    var d=new Date(today);d.setDate(today.getDate()-(today.getDay()-i));
    var dateStr=d.toISOString().slice(0,10);
    var dayData=mealCache[dateStr]||{};
    var hasDone=Object.values(dayData).some(function(v){return v.done;});
    var btn=document.createElement('div');
    btn.className='day-btn'+(i===currentDow?' active':'')+(hasDone?' has-data':'');
    btn.innerHTML='<span class="dn">'+DAYS_LABEL[i]+'</span><span class="dd">'+d.getDate()+'</span><span class="dot"></span>';
    (function(idx){btn.addEventListener('click',function(){currentDow=idx;renderPlan();});})(i);
    nav.appendChild(btn);
  }
}

function renderPlan(){
  var view=document.getElementById('view-plan');
  view.innerHTML='';
  renderNav();

  var dow=currentDow;
  var dateStr=getDayKey(dow);
  var plan=getDayPlan(dow);
  var dayData=mealCache[dateStr]||{};
  var isToday=dow===today.getDay();
  document.getElementById('header-sub').textContent=isToday?'Hoy - menu del dia':'Menu del dia';

  var doneMeals=Object.values(dayData).filter(function(v){return v.done;}).length;
  var totalMeals=3;

  ['desayuno','comida','cena'].forEach(function(mealType){
    var mealPlan=plan[mealType];
    var mealData=dayData[mealType]||{done:false,swapped_to:null};
    var mealName=mealData.swapped_to||mealPlan.name;

    var card=document.createElement('div');
    card.className='meal-card'+(mealData.done?' done':'');

    var hdr=document.createElement('div');
    hdr.className='meal-header';

    var iconDiv=document.createElement('div');
    iconDiv.className='meal-icon';
    iconDiv.style.background=mealType==='desayuno'?'rgba(186,117,23,0.15)':mealType==='comida'?'rgba(59,109,17,0.15)':'rgba(15,52,96,0.15)';
    iconDiv.textContent=mealPlan.icon;

    var info=document.createElement('div');
    info.className='meal-info';
    info.innerHTML='<div class="meal-type">'+mealType.charAt(0).toUpperCase()+mealType.slice(1)+'</div><div class="meal-name">'+mealName+'</div>';

    var checkBtn=document.createElement('div');
    checkBtn.className='btn-check'+(mealData.done?' done':'');
    checkBtn.innerHTML='<svg viewBox="0 0 13 13" fill="none"><polyline points="2,6.5 5,10 11,3" stroke="#C0DD97" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    checkBtn.addEventListener('click',function(){
      var cur=mealData.done;
      saveMeal(dateStr,mealType,!cur,mealData.swapped_to).then(function(){loadMeals().then(function(){renderPlan();});});
      showToast(cur?'Desmarcado':'Comida completada');
    });

    var swapBtn=document.createElement('button');
    swapBtn.className='btn-swap';
    swapBtn.textContent='Cambiar';
    swapBtn.addEventListener('click',function(e){
      e.stopPropagation();
      card.classList.toggle('swap-open');
    });

    var actions=document.createElement('div');
    actions.className='meal-actions';
    actions.appendChild(swapBtn);
    actions.appendChild(checkBtn);

    hdr.appendChild(iconDiv);
    hdr.appendChild(info);
    hdr.appendChild(actions);
    card.appendChild(hdr);

    if(mealPlan.tip&&!mealData.done){
      var tip=document.createElement('div');
      tip.className='tip-card';
      tip.style.margin='0 14px 10px';
      tip.style.background='rgba(26,42,10,0.5)';
      tip.style.border='none';
      tip.innerHTML='<div class="tip-title">Tip</div><div class="tip-text">'+mealPlan.tip+'</div>';
      card.appendChild(tip);
    }

    var swapArea=document.createElement('div');
    swapArea.className='swap-area';
    swapArea.innerHTML='<div class="swap-label">Elige una alternativa:</div><div class="swap-opts"></div>';
    var opts=swapArea.querySelector('.swap-opts');
    (SWAPS[mealType]||[]).forEach(function(opt){
      var o=document.createElement('div');
      o.className='swap-opt';
      o.textContent=opt;
      o.addEventListener('click',function(){
        saveMeal(dateStr,mealType,mealData.done,opt).then(function(){loadMeals().then(function(){renderPlan();});});
        showToast('Comida cambiada');
      });
      opts.appendChild(o);
    });
    card.appendChild(swapArea);
    view.appendChild(card);
  });

  var prog=document.createElement('div');
  prog.style.cssText='text-align:center;font-size:11px;color:#555;margin-top:12px';
  prog.textContent=doneMeals+' de '+totalMeals+' comidas completadas hoy';
  view.appendChild(prog);
}

// ── RENDER SHOP ─────────────────────────────────────────
function renderShop(){
  var view=document.getElementById('view-shop');
  view.innerHTML='';

  var addRow=document.createElement('div');
  addRow.className='add-shop-row';
  var input=document.createElement('input');
  input.className='add-shop-input';
  input.placeholder='Añadir producto...';
  input.type='text';
  var addBtn=document.createElement('button');
  addBtn.className='add-shop-btn';
  addBtn.textContent='+ Añadir';
  addRow.appendChild(input);
  addRow.appendChild(addBtn);
  view.appendChild(addRow);

  var catSel=document.createElement('select');
  catSel.className='cat-select';
  ['Proteina','Carbohidratos','Lacteos','Verdura','Extras','Otro'].forEach(function(c){
    var o=document.createElement('option');o.value=c;o.textContent=c;catSel.appendChild(o);
  });
  view.appendChild(catSel);

  addBtn.addEventListener('click',function(){
    var name=input.value.trim();
    if(!name){showToast('Escribe un producto');return;}
    addShopItem(name,catSel.value).then(function(){renderShop();showToast('Añadido');});
    input.value='';
  });
  input.addEventListener('keydown',function(e){if(e.key==='Enter'){addBtn.click();}});

  var bycat={};
  shopCache.forEach(function(i){ if(!bycat[i.category]) bycat[i.category]=[]; bycat[i.category].push(i); });

  if(!shopCache.length){
    var emp=document.createElement('div');emp.className='empty';emp.textContent='Lista vacia. Añade productos o carga la lista base.';view.appendChild(emp);
  } else {
    Object.keys(bycat).sort().forEach(function(cat){
      var lbl=document.createElement('div');lbl.className='section-label';lbl.textContent=cat;view.appendChild(lbl);
      bycat[cat].forEach(function(item){
        var div=document.createElement('div');
        div.className='shop-item'+(item.checked?' checked':'');
        var chk=document.createElement('div');
        chk.className='shop-check'+(item.checked?' checked':'');
        chk.innerHTML='<svg viewBox="0 0 12 12" fill="none"><polyline points="1.5,6 4.5,9.5 10.5,2.5" stroke="#85B7EB" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        chk.addEventListener('click',function(){toggleShopItem(item.id,!item.checked).then(function(){renderShop();});});
        var name=document.createElement('div');name.className='shop-name';name.textContent=item.name;
        var del=document.createElement('button');del.className='shop-del';del.textContent='×';
        del.addEventListener('click',function(){deleteShopItem(item.id);renderShop();});
        div.appendChild(chk);div.appendChild(name);div.appendChild(del);
        view.appendChild(div);
      });
    });
  }

  var loadBase=document.createElement('button');
  loadBase.className='add-btn-green';
  loadBase.textContent='Cargar lista base semanal';
  loadBase.addEventListener('click',function(){
    loadBase.disabled=true;
    loadBase.textContent='Cargando...';
    var wk=weekKey();
    var body=SHOP_BASE.map(function(i){return {name:i.name,category:i.cat,checked:false,week_key:wk};});
    fetch(SB_URL+'/rest/v1/shopping_items',{
      method:'POST',
      headers:{
        'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,
        'Content-Type':'application/json',
        'Prefer':'return=representation'
      },
      body:JSON.stringify(body)
    }).then(function(r){return r.json();})
    .then(function(){return loadShop();})
    .then(function(){renderShop();showToast('Lista base cargada');})
    .catch(function(){loadShop().then(function(){renderShop();showToast('Lista base cargada');});});
  });
  view.appendChild(loadBase);

  var clrBtn=document.createElement('button');
  clrBtn.className='clear-btn';
  clrBtn.textContent='Borrar productos marcados';
  clrBtn.addEventListener('click',function(){
    var checked=shopCache.filter(function(i){return i.checked;});
    var promises=checked.map(function(i){return deleteShopItem(i.id);});
    Promise.all(promises).then(function(){renderShop();showToast('Limpiado');});
  });
  view.appendChild(clrBtn);
}

// ── RENDER BATCH ────────────────────────────────────────

  var tip=document.createElement('div');

  view.appendChild(salsa);
}

// ── TABS ────────────────────────────────────────────────
function goTab(t){
  currentTab=t;
  ['plan','shop','batch'].forEach(function(x){
    document.getElementById('view-'+x).style.display=x===t?'block':'none';
    document.getElementById('tab-'+x).classList.remove('active');
  });
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='plan') renderPlan();
  if(t==='shop') renderShop();
  if(t==='batch') renderBatch();
}

document.getElementById('tab-plan').addEventListener('click',function(){goTab('plan');});
document.getElementById('tab-shop').addEventListener('click',function(){goTab('shop');});
document.getElementById('tab-batch').addEventListener('click',function(){goTab('batch');});

var toastT;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},1400);}

// Init
setSyncStatus('syncing');
Promise.all([loadMeals(),loadShop()]).then(function(){goTab('plan');});
</script>
