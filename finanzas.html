<title>Finanzas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f1a;color:#eee;min-height:100vh;padding-bottom:60px}
.app{max-width:420px;margin:0 auto;padding:14px}
.header{background:#1a1a2e;border:1px solid #2c2c4a;border-radius:16px;padding:16px;margin-bottom:12px}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.header h1{font-size:18px;font-weight:600;color:#fff}
.month-nav{display:flex;align-items:center;gap:8px}
.month-btn{background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:2px 8px}
.month-label{font-size:12px;font-weight:600;color:#ccc;min-width:100px;text-align:center}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#444;display:inline-block;margin-left:6px;vertical-align:middle}
.sync-dot.ok{background:#63991b}.sync-dot.syncing{background:#BA7517;animation:pulse 1s infinite}.sync-dot.err{background:#A32D2D}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.erasmus-bar{background:#0d1a0d;border:1px solid #27500A;border-radius:12px;padding:12px;margin-bottom:12px}
.erasmus-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.erasmus-title{font-size:12px;font-weight:600;color:#C0DD97}
.erasmus-amounts{font-size:11px;color:#63991b}
.erasmus-track{background:#0a120a;border-radius:6px;height:8px;margin-bottom:6px}
.erasmus-fill{height:8px;border-radius:6px;background:#3B6D11;transition:width .4s}
.erasmus-bottom{display:flex;justify-content:space-between;font-size:10px;color:#3B6D11}
.balance-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.bal-card{background:#0d0d1a;border-radius:10px;padding:10px;text-align:center}
.bal-label{font-size:9px;color:#666;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.bal-amount{font-size:15px;font-weight:700}
.green{color:#C0DD97}.red{color:#f09595}.blue{color:#85B7EB}
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab{flex:1;padding:9px 4px;background:#1a1a2e;border:1px solid #2c2c4a;border-radius:10px;cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:#666}
.tab.t-res.active{background:#0d1f3a;border-color:#185FA5;color:#85B7EB}
.tab.t-inc.active{background:#0d1a0d;border-color:#3B6D11;color:#C0DD97}
.tab.t-exp.active{background:#1a0d0d;border-color:#A32D2D;color:#f09595}
.section-label{font-size:10px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 7px}
.entry{background:#1a1a2e;border:1px solid #2c2c4a;border-radius:12px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.entry-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.entry-info{flex:1;min-width:0}
.entry-name{font-size:13px;color:#ccc;font-weight:500}
.entry-note{font-size:11px;color:#555;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.entry-right{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.entry-amt{font-size:14px;font-weight:700}
.del-btn{background:none;border:none;color:#444;font-size:18px;cursor:pointer;line-height:1;padding:0}
.fixed-tag{font-size:9px;background:#0d1f3a;color:#378ADD;border-radius:3px;padding:1px 4px;font-weight:600;display:inline-block;margin-top:2px}
.bar-row{margin-bottom:9px}
.bar-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.bar-top span:first-child{color:#888}
.bar-top span:last-child{color:#ccc;font-weight:500}
.bar-bg{background:#0d0d1a;border-radius:4px;height:5px}
.bar-fg{height:5px;border-radius:4px;background:#A32D2D}
.add-btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px}
.add-inc{background:#0d1a0d;border:1px solid #3B6D11;color:#C0DD97}
.add-exp{background:#1a0d0d;border:1px solid #A32D2D;color:#f09595}
.saving-box{background:#0d1a0d;border:1px solid #27500A;border-radius:12px;padding:14px;margin-bottom:10px}
.saving-title{font-size:11px;color:#63991b;font-weight:600;margin-bottom:8px}
.saving-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.saving-row span:first-child{font-size:12px;color:#888}
.saving-row span:last-child{font-size:13px;font-weight:600;color:#C0DD97}
.saving-tip{font-size:11px;color:#3B6D11;margin-top:8px;line-height:1.5;padding-top:8px;border-top:1px solid #1a2a1a}
.empty{text-align:center;padding:28px;color:#444;font-size:13px;line-height:1.8}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:#1a1a2e;border-radius:20px 20px 0 0;border-top:1px solid #2c2c4a;padding:20px;width:100%;max-width:420px}
.sheet h3{font-size:16px;font-weight:600;color:#fff;margin-bottom:16px}
.field{margin-bottom:11px}
.field label{font-size:11px;color:#666;display:block;margin-bottom:4px}
.field input{width:100%;background:#0d0d1a;border:1px solid #2c2c4a;border-radius:8px;padding:10px 12px;font-size:15px;color:#eee;font-family:inherit;outline:none}
.field input:focus{border-color:#3B6D11}
.field input.rinput:focus{border-color:#A32D2D}
.cat-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.cat-chip{padding:8px 2px;background:#0d0d1a;border:1px solid #2c2c4a;border-radius:8px;cursor:pointer;text-align:center}
.cat-chip .ci{font-size:18px;display:block}
.cat-chip .cl{font-size:10px;color:#666;display:block;margin-top:1px}
.cat-chip.sel-g{border-color:#3B6D11;background:#0d1a0d}
.cat-chip.sel-g .cl{color:#C0DD97}
.cat-chip.sel-r{border-color:#A32D2D;background:#1a0d0d}
.cat-chip.sel-r .cl{color:#f09595}
.sheet-btns{display:flex;gap:8px;margin-top:14px}
.btn-cancel{flex:1;padding:12px;background:#2c2c4a;border:none;border-radius:10px;color:#888;font-size:14px;font-weight:600;cursor:pointer}
.btn-save-g{flex:2;padding:12px;background:#3B6D11;border:none;border-radius:10px;color:#C0DD97;font-size:14px;font-weight:600;cursor:pointer}
.btn-save-r{flex:2;padding:12px;background:#A32D2D;border:none;border-radius:10px;color:#f09595;font-size:14px;font-weight:600;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#eee;color:#111;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>Finanzas <span class="sync-dot" id="sync-dot"></span></h1>
      <div class="month-nav">
        <button class="month-btn" id="btn-prev">&#8249;</button>
        <span class="month-label" id="lbl-month"></span>
        <button class="month-btn" id="btn-next">&#8250;</button>
      </div>
    </div>
    <div class="balance-row">
      <div class="bal-card"><div class="bal-label">Ingresos</div><div class="bal-amount green" id="lbl-inc">0,00 €</div></div>
      <div class="bal-card"><div class="bal-label">Gastos</div><div class="bal-amount red" id="lbl-exp">0,00 €</div></div>
      <div class="bal-card"><div class="bal-label">Libre</div><div class="bal-amount blue" id="lbl-free">0,00 €</div></div>
    </div>
  </div>
  <div class="erasmus-bar">
    <div class="erasmus-top">
      <span class="erasmus-title">Objetivo Erasmus — Enschede</span>
      <span class="erasmus-amounts" id="era-amounts"></span>
    </div>
    <div class="erasmus-track"><div class="erasmus-fill" id="era-fill" style="width:0%"></div></div>
    <div class="erasmus-bottom"><span id="era-pct">0% conseguido</span><span id="era-left"></span></div>
  </div>
  <div class="tabs">
    <div class="tab t-res active" id="tab-res">Resumen</div>
    <div class="tab t-inc" id="tab-inc">Ingresos</div>
    <div class="tab t-exp" id="tab-exp">Gastos</div>
  </div>
  <div id="view-res"></div>
  <div id="view-inc" style="display:none"></div>
  <div id="view-exp" style="display:none"></div>
</div>

<div class="overlay" id="sh-inc">
  <div class="sheet">
    <h3>Nuevo ingreso</h3>
    <div class="field"><label>Categoria</label><div class="cat-wrap" id="cg-inc"></div></div>
    <div class="field"><label>Importe (€)</label><input type="number" inputmode="decimal" id="in-amt" placeholder="0.00"></div>
    <div class="field"><label>Nota (opcional)</label><input type="text" id="in-note" placeholder="Descripcion..."></div>
    <div class="sheet-btns">
      <button class="btn-cancel" id="cancel-inc">Cancelar</button>
      <button class="btn-save-g" id="save-inc">Guardar</button>
    </div>
  </div>
</div>

<div class="overlay" id="sh-exp">
  <div class="sheet">
    <h3>Nuevo gasto</h3>
    <div class="field"><label>Categoria</label><div class="cat-wrap" id="cg-exp"></div></div>
    <div class="field"><label>Importe (€)</label><input class="rinput" type="number" inputmode="decimal" id="ex-amt" placeholder="0.00"></div>
    <div class="field"><label>Nota (opcional)</label><input class="rinput" type="text" id="ex-note" placeholder="Descripcion..."></div>
    <div class="sheet-btns">
      <button class="btn-cancel" id="cancel-exp">Cancelar</button>
      <button class="btn-save-r" id="save-exp">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SB_URL = 'https://jqmfbodxyidnwnvqfjfh.supabase.co';
var SB_KEY = 'sb_publishable_VzI9uNGpvzXuK3ZIodJCNw_H39Ri-ey';
var ERASMUS_GOAL = 4500;
var SAVINGS_ALREADY = 933;
var SAVINGS_PCT = 40;
var MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

var INC_CATS = [
  {id:'practicas',icon:'💼',label:'Practicas'},
  {id:'futbol',   icon:'⚽',label:'Futbol'},
  {id:'familia',  icon:'👨',label:'Familia'},
  {id:'workaway', icon:'🌍',label:'Workaway'},
  {id:'extra',    icon:'✨',label:'Extra'}
];
var EXP_CATS = [
  {id:'comida',   icon:'🛒',label:'Comida'},
  {id:'gasolina', icon:'⛽',label:'Gasolina'},
  {id:'ocio',     icon:'🎉',label:'Ocio'},
  {id:'ropa',     icon:'👕',label:'Ropa'},
  {id:'barberia', icon:'✂️',label:'Barberia'},
  {id:'piso',     icon:'🏠',label:'Piso'},
  {id:'suscr',    icon:'📱',label:'Suscripc.'},
  {id:'otro',     icon:'📦',label:'Otro'}
];
var FIXED_EXP = [
  {cat:'piso',     label:'Gastos comunes piso', amount:50},
  {cat:'gasolina', label:'Gasolina',             amount:45},
  {cat:'comida',   label:'Compra mensual',        amount:180},
  {cat:'barberia', label:'Barberia',              amount:15}
];

var cur = new Date();
var currentTab = 'res';
var selInc = 'practicas';
var selExp = 'otro';
var monthCache = {};

function mk(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function fmt(n){ return n.toFixed(2).replace('.',',')+' €'; }
function catIcon(cats,id){ var c=cats.find(function(x){return x.id===id;}); return c?c.icon:'📦'; }
function catLabel(cats,id){ var c=cats.find(function(x){return x.id===id;}); return c?c.label:id; }
function setSyncStatus(s){ document.getElementById('sync-dot').className='sync-dot '+s; }

function sbReq(method, path, body){
  return fetch(SB_URL+'/rest/v1/'+path,{
    method:method,
    headers:{
      'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,
      'Content-Type':'application/json',
      'Prefer': method==='POST'?'return=representation':''
    },
    body:body?JSON.stringify(body):undefined
  }).then(function(r){return r.json();});
}

function loadMonth(month){
  setSyncStatus('syncing');
  return sbReq('GET','finance_logs?month=eq.'+month+'&select=*')
    .then(function(rows){
      monthCache[month] = Array.isArray(rows)?rows:[];
      setSyncStatus('ok');
      return monthCache[month];
    }).catch(function(){ setSyncStatus('err'); return monthCache[month]||[]; });
}

function ensureFixed(month){
  var rows = monthCache[month]||[];
  var hasFixed = rows.some(function(r){return r.fixed;});
  if(hasFixed) return Promise.resolve();
  var inserts = FIXED_EXP.map(function(f){
    return {month:month,type:'exp',cat:f.cat,label:f.label,amount:f.amount,note:'',fixed:true};
  });
  return sbReq('POST','finance_logs',inserts)
    .then(function(res){
      if(Array.isArray(res)) monthCache[month] = (monthCache[month]||[]).concat(res);
    }).catch(function(){});
}

function addEntry(type, cat, label, amount, note){
  setSyncStatus('syncing');
  var month = mk(cur);
  var body = {month:month,type:type,cat:cat,label:label,amount:amount,note:note,fixed:false};
  return sbReq('POST','finance_logs',body)
    .then(function(res){
      if(Array.isArray(res) && res.length) monthCache[month] = (monthCache[month]||[]).concat(res);
      else if(res && res.id) monthCache[month] = (monthCache[month]||[]).concat([res]);
      setSyncStatus('ok');
    }).catch(function(){setSyncStatus('err');showToast('Error de conexion');});
}

function deleteEntry(id){
  setSyncStatus('syncing');
  var month = mk(cur);
  return sbReq('DELETE','finance_logs?id=eq.'+id)
    .then(function(){
      monthCache[month] = (monthCache[month]||[]).filter(function(r){return r.id!==id;});
      setSyncStatus('ok');
      render();
      showToast('Eliminado');
    }).catch(function(){setSyncStatus('err');});
}

function getRows(){ return monthCache[mk(cur)]||[]; }

function totalSaved(){
  var total = SAVINGS_ALREADY;
  Object.keys(monthCache).forEach(function(m){
    var rows = monthCache[m]||[];
    var inc = rows.filter(function(r){return r.type==='inc';}).reduce(function(s,r){return s+r.amount;},0);
    total += inc*(SAVINGS_PCT/100);
  });
  return total;
}

function renderErasmus(){
  var saved = totalSaved();
  var pct = Math.min(100,Math.round(saved/ERASMUS_GOAL*100));
  var left = Math.max(0,ERASMUS_GOAL-saved);
  document.getElementById('era-amounts').textContent = fmt(saved)+' / '+fmt(ERASMUS_GOAL);
  document.getElementById('era-fill').style.width = pct+'%';
  document.getElementById('era-pct').textContent = pct+'% conseguido';
  document.getElementById('era-left').textContent = 'Faltan '+fmt(left);
}

function renderHeader(){
  var rows = getRows();
  var inc = rows.filter(function(r){return r.type==='inc';}).reduce(function(s,r){return s+r.amount;},0);
  var exp = rows.filter(function(r){return r.type==='exp';}).reduce(function(s,r){return s+r.amount;},0);
  var free = inc-exp;
  document.getElementById('lbl-inc').textContent = fmt(inc);
  document.getElementById('lbl-exp').textContent = fmt(exp);
  var el = document.getElementById('lbl-free');
  el.textContent = fmt(Math.abs(free));
  el.className = 'bal-amount '+(free>=0?'blue':'red');
  document.getElementById('lbl-month').textContent = MONTHS[cur.getMonth()]+' '+cur.getFullYear();
}

function makeEntry(icon,name,note,amtText,amtClass,isFixed,onDel){
  var div = document.createElement('div');
  div.className = 'entry';
  var iconDiv = document.createElement('div');
  iconDiv.className = 'entry-icon';
  iconDiv.textContent = icon;
  var info = document.createElement('div');
  info.className = 'entry-info';
  var nameDiv = document.createElement('div');
  nameDiv.className = 'entry-name';
  nameDiv.textContent = name;
  if(isFixed){var tag=document.createElement('span');tag.className='fixed-tag';tag.textContent='fijo';nameDiv.appendChild(tag);}
  info.appendChild(nameDiv);
  if(note){var nd=document.createElement('div');nd.className='entry-note';nd.textContent=note;info.appendChild(nd);}
  var right = document.createElement('div');
  right.className = 'entry-right';
  var amt = document.createElement('div');
  amt.className = 'entry-amt '+amtClass;
  amt.textContent = amtText;
  right.appendChild(amt);
  if(!isFixed&&onDel){var btn=document.createElement('button');btn.className='del-btn';btn.textContent='×';btn.addEventListener('click',onDel);right.appendChild(btn);}
  div.appendChild(iconDiv);div.appendChild(info);div.appendChild(right);
  return div;
}

function renderRes(){
  var rows = getRows();
  var incRows = rows.filter(function(r){return r.type==='inc';});
  var inc = incRows.reduce(function(s,r){return s+r.amount;},0);
  var exp = rows.filter(function(r){return r.type==='exp';}).reduce(function(s,r){return s+r.amount;},0);
  var toSave = inc*(SAVINGS_PCT/100);
  var toSpend = Math.max(0, inc - toSave - exp);
  var view = document.getElementById('view-res');
  view.innerHTML = '';

  var incBreakdown = '';
  if(incRows.length > 1){
    incRows.forEach(function(r){
      var apartado = r.amount*(SAVINGS_PCT/100);
      incBreakdown += '<div class="saving-row" style="font-size:11px;color:#555"><span>↳ '+r.label+' ('+fmt(r.amount)+')</span><span style="color:#63991b">→ '+fmt(apartado)+'</span></div>';
    });
  }

  var box = document.createElement('div');
  box.className = 'saving-box';
  box.innerHTML = '<div class="saving-title">Regla del '+SAVINGS_PCT+'% este mes</div>'+
    '<div class="saving-row"><span>Ingresos totales</span><span>'+fmt(inc)+'</span></div>'+
    incBreakdown+
    '<div class="saving-row"><span>Apartar para Erasmus ('+SAVINGS_PCT+'%)</span><span style="color:#C0DD97">'+fmt(toSave)+'</span></div>'+
    '<div class="saving-row"><span>Gastos totales</span><span style="color:#f09595">-'+fmt(exp)+'</span></div>'+
    '<div class="saving-row"><span>Queda para gastar</span><span style="color:#85B7EB">'+fmt(toSpend)+'</span></div>'+
    (toSave>0?'<div class="saving-tip">Transfiere '+fmt(toSave)+' a tu cuenta de ahorro.</div>':'');
  view.appendChild(box);

  var bycat={};
  rows.filter(function(r){return r.type==='exp';}).forEach(function(r){bycat[r.cat]=(bycat[r.cat]||0)+r.amount;});
  var sorted=Object.entries(bycat).sort(function(a,b){return b[1]-a[1];});
  if(sorted.length){
    var lbl=document.createElement('div');lbl.className='section-label';lbl.textContent='Gastos por categoria';view.appendChild(lbl);
    sorted.forEach(function(pair){
      var cat=pair[0],amt=pair[1],pct=exp>0?Math.round(amt/exp*100):0;
      var row=document.createElement('div');row.className='bar-row';
      row.innerHTML='<div class="bar-top"><span>'+catIcon(EXP_CATS,cat)+' '+catLabel(EXP_CATS,cat)+'</span><span>'+fmt(amt)+' · '+pct+'%</span></div><div class="bar-bg"><div class="bar-fg" style="width:'+pct+'%"></div></div>';
      view.appendChild(row);
    });
  }

  var lbl2=document.createElement('div');lbl2.className='section-label';lbl2.textContent='Ultimos movimientos';view.appendChild(lbl2);
  var all=rows.slice().sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);}).slice(0,6);
  if(!all.length){var emp=document.createElement('div');emp.className='empty';emp.textContent='Sin movimientos este mes';view.appendChild(emp);}
  else all.forEach(function(r){
    var cats=r.type==='inc'?INC_CATS:EXP_CATS;
    view.appendChild(makeEntry(catIcon(cats,r.cat),r.label,r.note,(r.type==='inc'?'+':'-')+fmt(r.amount),r.type==='inc'?'green':'red',r.fixed,null));
  });
}

function renderInc(){
  var rows = getRows().filter(function(r){return r.type==='inc';}).slice().reverse();
  var view = document.getElementById('view-inc');
  view.innerHTML='';
  if(!rows.length){var emp=document.createElement('div');emp.className='empty';emp.textContent='Sin ingresos este mes';view.appendChild(emp);}
  rows.forEach(function(r){
    (function(row){
      var apartado = row.amount*(SAVINGS_PCT/100);
      var noteText = (row.note ? row.note+' · ' : '') + '→ apartar '+fmt(apartado);
      view.appendChild(makeEntry(catIcon(INC_CATS,row.cat),row.label,noteText,'+'+fmt(row.amount),'green',false,function(){deleteEntry(row.id);}));
    })(r);
  });
  var btn=document.createElement('button');btn.className='add-btn add-inc';btn.textContent='+ Añadir ingreso';
  btn.addEventListener('click',function(){openSheet('sh-inc');});
  view.appendChild(btn);
}

function renderExp(){
  var rows = getRows().filter(function(r){return r.type==='exp';}).slice().reverse();
  var view = document.getElementById('view-exp');
  view.innerHTML='';
  if(!rows.length){var emp=document.createElement('div');emp.className='empty';emp.textContent='Sin gastos este mes';view.appendChild(emp);}
  rows.forEach(function(r){
    (function(row){
      view.appendChild(makeEntry(catIcon(EXP_CATS,row.cat),row.label,row.note,'-'+fmt(row.amount),'red',row.fixed,row.fixed?null:function(){deleteEntry(row.id);}));
    })(r);
  });
  var btn=document.createElement('button');btn.className='add-btn add-exp';btn.textContent='+ Añadir gasto';
  btn.addEventListener('click',function(){openSheet('sh-exp');});
  view.appendChild(btn);
}

function goTab(t){
  currentTab=t;
  ['res','inc','exp'].forEach(function(x){
    document.getElementById('view-'+x).style.display=x===t?'block':'none';
    document.getElementById('tab-'+x).classList.remove('active');
  });
  document.getElementById('tab-'+t).classList.add('active');
  render();
}

function render(){
  renderHeader();renderErasmus();
  if(currentTab==='res')renderRes();
  if(currentTab==='inc')renderInc();
  if(currentTab==='exp')renderExp();
}

function openSheet(id){
  document.getElementById(id).classList.add('open');
  if(id==='sh-inc'){document.getElementById('in-amt').value='';document.getElementById('in-note').value='';buildCatGrid('cg-inc',INC_CATS,selInc,'g');}
  else{document.getElementById('ex-amt').value='';document.getElementById('ex-note').value='';buildCatGrid('cg-exp',EXP_CATS,selExp,'r');}
}
function closeSheet(id){document.getElementById(id).classList.remove('open');}

function buildCatGrid(containerId,cats,selected,type){
  var wrap=document.getElementById(containerId);wrap.innerHTML='';
  cats.forEach(function(c){
    var chip=document.createElement('div');
    chip.className='cat-chip'+(c.id===selected?' sel-'+type:'');
    chip.innerHTML='<span class="ci">'+c.icon+'</span><span class="cl">'+c.label+'</span>';
    chip.addEventListener('click',function(){if(type==='g')selInc=c.id;else selExp=c.id;buildCatGrid(containerId,cats,c.id,type);});
    wrap.appendChild(chip);
  });
}

document.getElementById('tab-res').addEventListener('click',function(){goTab('res');});
document.getElementById('tab-inc').addEventListener('click',function(){goTab('inc');});
document.getElementById('tab-exp').addEventListener('click',function(){goTab('exp');});
document.getElementById('btn-prev').addEventListener('click',function(){
  cur.setMonth(cur.getMonth()-1);
  var m=mk(cur);
  if(!monthCache[m]){loadMonth(m).then(function(){return ensureFixed(m);}).then(function(){render();});}
  else render();
});
document.getElementById('btn-next').addEventListener('click',function(){
  cur.setMonth(cur.getMonth()+1);
  var m=mk(cur);
  if(!monthCache[m]){loadMonth(m).then(function(){return ensureFixed(m);}).then(function(){render();});}
  else render();
});
document.getElementById('cancel-inc').addEventListener('click',function(){closeSheet('sh-inc');});
document.getElementById('cancel-exp').addEventListener('click',function(){closeSheet('sh-exp');});
document.getElementById('save-inc').addEventListener('click',function(){
  var amt=parseFloat(document.getElementById('in-amt').value);
  if(!amt||amt<=0){showToast('Introduce un importe');return;}
  var note=document.getElementById('in-note').value.trim();
  addEntry('inc',selInc,catLabel(INC_CATS,selInc),amt,note).then(function(){closeSheet('sh-inc');goTab('inc');showToast('Ingreso guardado');});
});
document.getElementById('save-exp').addEventListener('click',function(){
  var amt=parseFloat(document.getElementById('ex-amt').value);
  if(!amt||amt<=0){showToast('Introduce un importe');return;}
  var note=document.getElementById('ex-note').value.trim();
  addEntry('exp',selExp,catLabel(EXP_CATS,selExp),amt,note).then(function(){closeSheet('sh-exp');goTab('exp');showToast('Gasto guardado');});
});
document.querySelectorAll('.overlay').forEach(function(el){el.addEventListener('click',function(e){if(e.target===el)el.classList.remove('open');});});

var toastT;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},1400);}

// Init
setSyncStatus('syncing');
var m = mk(cur);
loadMonth(m).then(function(){return ensureFixed(m);}).then(function(){goTab('res');});
</script>
</body>
</html>
