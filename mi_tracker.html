<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tracker">
<title>Mi Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f1a;color:#eee;min-height:100vh;padding-bottom:60px}
.app{max-width:420px;margin:0 auto;padding:14px}

/* ── Header ─────────────────────────────────────────────── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.topbar h1{font-size:17px;font-weight:600;color:#fff}
.topbar .date{font-size:11px;color:#666;margin-top:1px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#444;flex-shrink:0}
.sync-dot.ok{background:#63991b}.sync-dot.syncing{background:#BA7517;animation:pulse 1s infinite}.sync-dot.err{background:#A32D2D}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Score hero ─────────────────────────────────────────── */
.hero{background:linear-gradient(180deg,#16132a 0%,#0f0f1a 100%);border:1px solid #2c2c4a;border-radius:18px;padding:18px 16px;margin-bottom:12px}
.hero-row{display:flex;align-items:flex-end;gap:14px;margin-bottom:10px}
.score-now{flex:1}
.score-label{font-size:10px;color:#7F77DD;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:2px}
.score-num{font-size:46px;font-weight:700;color:#fff;line-height:1;letter-spacing:-1px}
.score-num.neg{color:#f09595}
.score-max{font-size:13px;color:#555;margin-left:4px;font-weight:500}
.score-7d{text-align:right;flex-shrink:0}
.score-7d-label{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.score-7d-num{font-size:22px;font-weight:600;color:#aaa}
.compare{display:flex;gap:14px;font-size:11px;color:#666;padding-top:10px;border-top:1px solid #1f1f3a}
.compare span{flex:1}
.compare b{font-weight:600}
.compare .up{color:#C0DD97}
.compare .down{color:#f09595}
.compare .eq{color:#888}

/* ── Apuesta semanal ────────────────────────────────────── */
.bet-card{background:#1a1a2e;border:1px solid #2c2c4a;border-radius:14px;padding:13px 15px;margin-bottom:12px;cursor:pointer}
.bet-card.empty{border-style:dashed;border-color:#3a3a5a;background:#111120}
.bet-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.bet-label{font-size:10px;color:#FAC775;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.bet-progress-text{font-size:11px;color:#888;font-weight:500}
.bet-text{font-size:13px;color:#eee;line-height:1.4;margin-bottom:8px}
.bet-text.placeholder{color:#555;font-style:italic}
.bet-bar{background:#0d0d1a;border-radius:4px;height:5px;overflow:hidden}
.bet-bar-fg{height:5px;border-radius:4px;background:linear-gradient(90deg,#BA7517,#FAC775);transition:width .4s}

/* ── Tabs ───────────────────────────────────────────────── */
.tabs{display:flex;gap:6px;margin-bottom:10px}
.tab{flex:1;padding:9px 4px;background:#1a1a2e;border:1px solid #2c2c4a;border-radius:10px;cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:#666}
.tab.t-hoy.active{background:#16132a;border-color:#534AB7;color:#7F77DD}
.tab.t-sue.active{background:#0d1f3a;border-color:#185FA5;color:#85B7EB}
.tab.t-his.active{background:#1a1a0d;border-color:#BA7517;color:#FAC775}

/* ── Day nav ───────────────────────────────────────────── */
.days-nav{display:flex;gap:5px;margin-bottom:12px}
.day-btn{flex:1;padding:7px 2px;background:#1a1a2e;border:1px solid #2c2c4a;border-radius:9px;cursor:pointer;text-align:center}
.day-btn.active{background:#534AB7;border-color:#534AB7}
.day-btn .dn{font-size:9px;color:#888;display:block}
.day-btn .dd{font-size:13px;font-weight:600;color:#fff;display:block}
.day-btn.active .dn{color:rgba(255,255,255,.7)}
.day-btn .ds{font-size:8px;color:#444;display:block;margin-top:1px;font-weight:600}
.day-btn .ds.s-hi{color:#63991b}
.day-btn .ds.s-mid{color:#BA7517}
.day-btn .ds.s-lo{color:#A32D2D}
.day-btn.active .ds{color:rgba(255,255,255,.6)}

/* ── Section ──────────────────────────────────────────── */
.section-label{font-size:10px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.7px;margin:14px 0 6px;padding:0 2px}

/* ── Core item ────────────────────────────────────────── */
.core-item{background:#1a1a2e;border:1px solid #2c2c4a;border-radius:13px;padding:12px 14px;margin-bottom:7px}
.core-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.core-name{font-size:13px;color:#ddd;font-weight:500}
.core-points{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;background:#0d0d1a;color:#666}
.core-points.has-pts{background:#1a3a08;color:#C0DD97}
.core-points.neg-pts{background:#2a0808;color:#f09595}
.scale-row{display:flex;gap:5px}
.scale-btn{flex:1;padding:8px 2px;background:#0d0d1a;border:1px solid #2c2c4a;border-radius:7px;cursor:pointer;text-align:center;font-size:10px;color:#666;transition:all .15s}
.scale-btn .sv{font-size:14px;font-weight:700;display:block;line-height:1.1}
.scale-btn .sl{font-size:9px;display:block;margin-top:1px;opacity:.7}
.scale-btn.sel-0{background:#1a0d0d;border-color:#3a1a1a;color:#a06060}
.scale-btn.sel-1{background:#1a1a0d;border-color:#3a2a0a;color:#FAC775}
.scale-btn.sel-2{background:#0d1a0d;border-color:#27500A;color:#C0DD97}
.scale-btn.sel-3{background:#16132a;border-color:#534AB7;color:#7F77DD}
.scale-btn.sel-2x{background:#0d1a0d;border-color:#27500A;color:#C0DD97}

/* ── Sueño ref ───────────────────────────────────────── */
.sleep-ref{font-size:10px;color:#666;margin-top:6px;display:flex;align-items:center;gap:6px}
.sleep-ref b{color:#85B7EB;font-weight:600}
.sleep-ref a{color:#85B7EB;text-decoration:none;font-size:10px;margin-left:auto;font-weight:600}

/* ── Móvil slider ────────────────────────────────────── */
.movil-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.movil-val{font-size:18px;font-weight:700;color:#85B7EB;width:50px;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums}
.movil-val.warn{color:#FAC775}
.movil-val.bad{color:#f09595}
.movil-slider{flex:1;accent-color:#185FA5}
.movil-info{font-size:10px;color:#555;margin-top:5px;display:flex;justify-content:space-between}

/* ── Tabaco ──────────────────────────────────────────── */
.tabaco-row{display:flex;align-items:center;gap:10px}
.tab-toggle{flex:1;padding:9px;background:#0d0d1a;border:1px solid #27500A;border-radius:8px;text-align:center;font-size:11px;color:#63991b;cursor:pointer;font-weight:600}
.tab-toggle.fumed{background:#1a0808;border-color:#A32D2D;color:#f09595}

/* ── Mantenimiento ───────────────────────────────────── */
.maint-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.maint-item{background:#1a1a2e;border:1px solid #2c2c4a;border-radius:10px;padding:10px 11px;display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none}
.maint-item.done{border-color:#27500A;background:#0d1a0d}
.maint-text{font-size:12px;color:#bbb;flex:1;line-height:1.2}
.maint-item.done .maint-text{color:#C0DD97}
.maint-check{width:20px;height:20px;border-radius:50%;border:1.5px solid #444;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.maint-item.done .maint-check{background:#3B6D11;border-color:#3B6D11}
.maint-check svg{display:none;width:11px;height:11px}
.maint-item.done .maint-check svg{display:block}

/* ── Rachas troncales ───────────────────────────────── */
.streaks-bar{display:flex;gap:8px;margin-bottom:12px}
.streak-card{flex:1;background:#1a1a2e;border:1px solid #2c2c4a;border-radius:12px;padding:11px 13px;position:relative;overflow:hidden}
.streak-card.alive{border-color:#27500A;background:linear-gradient(135deg,#0d1a0d 0%,#1a1a2e 100%)}
.streak-card.broken{border-color:#3a1a1a;background:linear-gradient(135deg,#1a0d0d 0%,#1a1a2e 100%)}
.streak-card.zero{opacity:.7}
.streak-name{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:3px}
.streak-card.alive .streak-name{color:#63991b}
.streak-card.broken .streak-name{color:#A32D2D}
.streak-count{font-size:22px;font-weight:700;color:#fff;line-height:1;font-variant-numeric:tabular-nums}
.streak-card.alive .streak-count{color:#C0DD97}
.streak-card.broken .streak-count{color:#f09595}
.streak-unit{font-size:10px;color:#666;margin-left:3px}
.streak-sub{font-size:10px;color:#555;margin-top:3px;font-weight:500}
.streak-card.broken .streak-sub{color:#f09595;font-weight:600}

/* ── Núcleo: stat frecuencia "X/7" dentro de core ── */
.core-freq{font-size:10px;color:#666;margin-left:8px;font-weight:500;font-variant-numeric:tabular-nums}
.core-freq.ok{color:#63991b}
.core-freq.warn{color:#BA7517}

/* ── Mantenimiento tri-estado ────────────────────── */
.maint-item.fail{border-color:#3a1a1a;background:#1a0d0d}
.maint-item.fail .maint-text{color:#f09595;text-decoration:line-through;text-decoration-color:#5a1a1a}
.maint-item.fail .maint-check{background:#1a0808;border-color:#A32D2D}
.maint-item.fail .maint-check svg{display:block}
.maint-item.fail .maint-check svg polyline{stroke:#A32D2D}

/* ── Sueño tab ───────────────────────────────────────── */
.sleep-card{background:#1a1a2e;border:1px solid #2c2c4a;border-radius:16px;padding:16px;margin-bottom:10px}
.sleep-title{font-size:13px;font-weight:600;color:#fff;margin-bottom:14px}
.sleep-hours-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.sleep-hours-label{font-size:12px;color:#888;width:60px;flex-shrink:0}
.sleep-hours-val{font-size:22px;font-weight:700;color:#85B7EB;width:60px;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums}
.sleep-slider{flex:1;accent-color:#185FA5}
.quality-row{display:flex;gap:8px;margin-bottom:14px}
.q-btn{flex:1;padding:8px 4px;background:#0d0d1a;border:1px solid #2c2c4a;border-radius:8px;cursor:pointer;text-align:center;font-size:11px;color:#666;transition:all .15s}
.q-btn.sel-1{background:#2a0808;border-color:#A32D2D;color:#f09595}
.q-btn.sel-2{background:#2a1f0a;border-color:#BA7517;color:#FAC775}
.q-btn.sel-3{background:#0d1a0d;border-color:#3B6D11;color:#C0DD97}
.q-btn.sel-4{background:#0d1f3a;border-color:#185FA5;color:#85B7EB}
.q-icon{font-size:16px;display:block;margin-bottom:2px}
.sleep-note{width:100%;background:#0d0d1a;border:1px solid #2c2c4a;border-radius:8px;padding:8px 10px;font-size:12px;color:#aaa;font-family:inherit;resize:none;outline:none;margin-bottom:12px}
.sleep-save{width:100%;padding:12px;background:#0F3460;border:1px solid #185FA5;border-radius:10px;color:#85B7EB;font-size:14px;font-weight:600;cursor:pointer}
.sleep-avg-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.sleep-avg-card{background:#0d0d1a;border-radius:10px;padding:10px;text-align:center}
.sleep-avg-label{font-size:9px;color:#666;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.sleep-avg-val{font-size:16px;font-weight:700;color:#85B7EB}
.sleep-hist-item{background:#1a1a2e;border:1px solid #2c2c4a;border-radius:12px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.sleep-hist-date{font-size:11px;color:#888;width:60px;flex-shrink:0}
.sleep-hist-bar-wrap{flex:1}
.sleep-hist-bar-bg{background:#0d0d1a;border-radius:4px;height:5px;margin-bottom:3px}
.sleep-hist-bar-fg{height:5px;border-radius:4px;background:#185FA5}
.sleep-hist-label{font-size:10px;color:#888}
.sleep-hist-right{text-align:right;flex-shrink:0}
.sleep-hist-hrs{font-size:14px;font-weight:700;color:#85B7EB;font-variant-numeric:tabular-nums}
.sleep-hist-q{font-size:11px;color:#555;margin-top:1px}

/* ── Histórico tab ──────────────────────────────────── */
.history-week{background:#1a1a2e;border:1px solid #2c2c4a;border-radius:13px;padding:13px 15px;margin-bottom:8px}
.hw-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.hw-range{font-size:11px;color:#888;font-weight:500}
.hw-avg{font-size:20px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums}
.hw-days{display:flex;gap:3px;margin-bottom:8px}
.hw-day{flex:1;height:22px;border-radius:4px;background:#0d0d1a;display:flex;align-items:center;justify-content:center;font-size:9px;color:#444;font-weight:600}
.hw-day.s-hi{background:#27500A;color:#C0DD97}
.hw-day.s-mid{background:#3a2a0a;color:#FAC775}
.hw-day.s-lo{background:#2a0808;color:#f09595}
.hw-bet{font-size:11px;color:#888;line-height:1.3;border-top:1px solid #2c2c4a;padding-top:7px;margin-top:7px}
.hw-bet b{color:#FAC775;font-weight:600}
.hw-bet .ok{color:#C0DD97}
.hw-bet .ko{color:#f09595}

.records-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.record-card{background:#1a1a2e;border:1px solid #2c2c4a;border-radius:11px;padding:11px}
.record-label{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;font-weight:600}
.record-val{font-size:18px;font-weight:700;color:#7F77DD;font-variant-numeric:tabular-nums}
.record-sub{font-size:10px;color:#555;margin-top:1px}

/* ── Modal review ────────────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:#1a1a2e;border-radius:20px 20px 0 0;border-top:1px solid #2c2c4a;padding:20px;width:100%;max-width:420px;max-height:88vh;overflow-y:auto}
.sheet h3{font-size:16px;font-weight:600;color:#fff;margin-bottom:4px}
.sheet .subtitle{font-size:11px;color:#888;margin-bottom:16px}
.sheet-field{margin-bottom:14px}
.sheet-field label{font-size:11px;color:#7F77DD;font-weight:600;display:block;margin-bottom:5px}
.sheet-field textarea, .sheet-field input{width:100%;background:#0d0d1a;border:1px solid #2c2c4a;border-radius:8px;padding:10px 12px;font-size:13px;color:#eee;font-family:inherit;resize:none;outline:none;line-height:1.4}
.sheet-field textarea{min-height:55px}
.sheet-field textarea:focus, .sheet-field input:focus{border-color:#7F77DD}
.sheet-field .help{font-size:10px;color:#555;margin-top:3px}
.sheet-btns{display:flex;gap:8px;margin-top:14px}
.btn-cancel{flex:1;padding:11px;background:#2c2c4a;border:none;border-radius:10px;color:#888;font-size:13px;font-weight:600;cursor:pointer}
.btn-save{flex:2;padding:11px;background:#534AB7;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}

/* ── Sunday banner ──────────────────────────────────── */
.sunday-banner{background:#1a1a0d;border:1px solid #BA7517;border-radius:13px;padding:13px 15px;margin-bottom:12px;cursor:pointer}
.sunday-banner-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.sunday-label{font-size:10px;color:#FAC775;text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.sunday-arrow{color:#FAC775;font-size:14px;font-weight:700}
.sunday-text{font-size:12px;color:#bbb;line-height:1.4}

/* ── Botón abrir review ──────────────────────────────── */
.review-btn{width:100%;padding:12px;background:#16132a;border:1px solid #534AB7;border-radius:11px;color:#7F77DD;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px}

/* ── Toast ──────────────────────────────────────────── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#eee;color:#111;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1}

/* ── Navegación semanal ───────────────────────────── */
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:0 2px;margin-bottom:8px;font-size:11px;color:#666;font-weight:500}
.week-nav-arrow{background:none;border:none;color:#7F77DD;font-size:14px;font-weight:600;cursor:pointer;padding:4px 10px;border-radius:6px}
.week-nav-arrow:active{background:#16132a}
.week-nav-arrow:disabled{color:#333;cursor:not-allowed}
.week-nav-arrow:disabled:active{background:none}
.week-nav-label{flex:1;text-align:center;letter-spacing:.3px}
.week-nav-label.past{color:#BA7517}

/* ── Banner día no editable ─────────────────────── */
.locked-banner{background:#1a1a0d;border:1px solid #3a2a0a;border-radius:11px;padding:10px 13px;margin-bottom:10px;font-size:12px;color:#FAC775;line-height:1.4;text-align:center}

/* ── Read-only en scale buttons ─────────────────── */
.scale-btn.locked{opacity:.5;cursor:not-allowed;pointer-events:none}
.maint-item.locked{opacity:.5;cursor:not-allowed;pointer-events:none}
.movil-slider:disabled{opacity:.5;cursor:not-allowed}

/* ── Sueño: selector de fecha ────────────────────── */
.sleep-date-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.sleep-date-label{font-size:11px;color:#888;font-weight:500;flex-shrink:0;width:100%;margin-bottom:2px}
.sleep-date-chips{display:flex;gap:5px;flex-wrap:wrap;width:100%}
.sleep-date-chip{background:#0d0d1a;border:1px solid #2c2c4a;border-radius:7px;padding:6px 10px;font-size:11px;color:#888;cursor:pointer;font-weight:500;white-space:nowrap}
.sleep-date-chip.active{background:#0d1f3a;border-color:#185FA5;color:#85B7EB}
.sleep-date-chip.has-data::after{content:" ●";color:#185FA5;font-size:8px;vertical-align:middle;margin-left:2px}

/* ── Empty ──────────────────────────────────────────── */
.empty{text-align:center;padding:30px 20px;color:#444;font-size:12px;line-height:1.7}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div>
      <h1>Mi Tracker</h1>
      <div class="date" id="header-date"></div>
    </div>
    <div class="sync-dot" id="sync-dot"></div>
  </div>

  <!-- Hero score -->
  <div class="hero">
    <div class="hero-row">
      <div class="score-now">
        <div class="score-label">Hoy</div>
        <div><span class="score-num" id="score-num">0</span><span class="score-max">/100</span></div>
      </div>
      <div class="score-7d">
        <div class="score-7d-label">Media 7d</div>
        <div class="score-7d-num" id="score-7d">—</div>
      </div>
    </div>
    <div class="compare">
      <span>vs sem. pasada: <b id="cmp-1w">—</b></span>
      <span>vs hace 4 sem: <b id="cmp-4w">—</b></span>
    </div>
  </div>

  <!-- Rachas troncales -->
  <div class="streaks-bar" id="streaks-bar"></div>

  <!-- Apuesta semanal -->
  <div class="bet-card" id="bet-card">
    <div class="bet-top">
      <span class="bet-label">Apuesta de la semana</span>
      <span class="bet-progress-text" id="bet-progress-text"></span>
    </div>
    <div class="bet-text" id="bet-text"></div>
    <div class="bet-bar"><div class="bet-bar-fg" id="bet-bar-fg" style="width:0%"></div></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab t-hoy active" id="tab-hoy">Hoy</div>
    <div class="tab t-sue" id="tab-sue">Sueño</div>
    <div class="tab t-his" id="tab-his">Historial</div>
  </div>

  <!-- Vista HOY -->
  <div id="view-hoy"></div>

  <!-- Vista Sueño -->
  <div id="view-sue" style="display:none"></div>

  <!-- Vista Historial -->
  <div id="view-his" style="display:none"></div>

</div>

<!-- Modal review semanal -->
<div class="overlay" id="ov-review">
  <div class="sheet">
    <h3>Review de la semana</h3>
    <div class="subtitle" id="review-week-range"></div>
    <div class="sheet-field">
      <label>¿Dónde he estado sólido?</label>
      <textarea id="rv-solido" placeholder="Lo que ha ido bien, donde he competido bien..."></textarea>
    </div>

// Sueño se calcula desde sleep_logs (horas reales)
// 0..18 puntos. Tabla: <5h=0, 6h=8, 7h=14, 7.5h=16, 8h+=18
function scoreSueno(horas){
  if(!horas || horas <= 0) return 0;
  if(horas < 5) return 0;
  if(horas < 6) return Math.round((horas-5)*8);   // 5→0, 6→8
  if(horas < 7) return Math.round(8 + (horas-6)*6); // 6→8, 7→14
  if(horas < 8) return Math.round(14 + (horas-7)*4); // 7→14, 8→18
  return 18; // tope
}

// Móvil: hasta 1.5h = 0, escala lineal hasta 4h = -20
function scoreMovil(horas){
  if(!horas || horas <= 1.5) return 0;
  if(horas >= 4) return -20;
  return -Math.round((horas - 1.5) / 2.5 * 20);
}

// ── RACHAS TRONCALES ────────────────────────────────────────
// Reglas:
// - Móvil controlado: día se considera "cumplido" si movil_horas > 0 (registrado) Y <= 1.5
// - Estudio profundo: día se considera "cumplido" si estudio >= 2 (marcado al menos sólido)
// - Día "registrado" para móvil: movil_horas > 0 (slider tocado)
// - Día "registrado" para estudio: estudio > 0 (algún botón tocado, incluido 0 si está explícito).
//   Para distinguir 0 explícito de "no marcado", usamos un trick: si daily existe y tiene fecha
//   pero estudio===0, lo consideramos no registrado salvo que otra cosa en el daily esté marcada.
// - Pausa: 1 día sin registro no rompe. 2 días consecutivos sin registro rompen.
// - Si el día está registrado pero falla el hábito, rompe inmediatamente.
//
// Devuelve: {count: número de días en racha, broken: bool si la racha se rompió hoy/ayer}

function dayHasAnyMark(daily){
  if(!daily) return false;
  if((daily.movil_horas||0) > 0) return true;
  if((daily.estudio||0) > 0) return true;
  if((daily.cuerpo||0) > 0) return true;
  if((daily.orden_prep||0) > 0) return true;
  if((daily.puntualidad||0) > 0) return true;
  // Mantenimiento: si alguno tiene valor distinto de 0 (positivo o negativo) cuenta como marcado
  for(var i=0;i<MAINT.length;i++){
    if((daily[MAINT[i].id]||0) !== 0) return true;
  }
  return false;
}

function dayRegisteredForTrunk(daily, trunkId){
  // Para móvil: solo cuenta como registrado si el slider se ha movido (>0)
  // Para estudio: cuenta si estudio>0 O si hay marcas de otras cosas (asumimos que el usuario abrió la app)
  if(!daily) return false;
  if(trunkId === 'movil'){
    return (daily.movil_horas || 0) > 0;
  }
  if(trunkId === 'estudio'){
    // Si el usuario tocó algo del día pero no el estudio, consideramos que estudio=0 implícito
    // y por tanto NO cumple. Para evitar trampa de "no marco estudio para no romper".
    return dayHasAnyMark(daily);
  }
  return false;
}

function dayPassesTrunk(daily, sleep, trunkId){
  if(!daily) return false;
  if(trunkId === 'movil'){
    var h = daily.movil_horas || 0;
    return h > 0 && h <= 1.5;
  }
  if(trunkId === 'estudio'){
    return (daily.estudio || 0) >= 2;
  }
  return false;
}

// Calcular racha actual de un hábito troncal
// Recorre hacia atrás desde hoy. Permite 1 día de pausa. 2 consecutivos sin registro rompen.
function computeTrunkStreak(trunkId){
  var count = 0;
  var consecutiveUnregistered = 0;
  var broken = false;
  // Recorrer desde hoy hacia atrás, hasta 60 días máximo
  for(var i=0;i<60;i++){
    var d = new Date(today);
    d.setDate(today.getDate() - i);
    var k = dateKey(d);
    var daily = dailyCache[k];
    var registered = dayRegisteredForTrunk(daily, trunkId);
    if(!registered){
      consecutiveUnregistered++;
      if(consecutiveUnregistered >= 2){
        // 2 días seguidos sin registro -> racha rota
        break;
      }
      // 1 día sin registro -> pausa, no rompe, sigue contando atrás
      continue;
    }
    // Día registrado
    consecutiveUnregistered = 0;
    if(dayPassesTrunk(daily, sleepCache[k], trunkId)){
      count++;
    } else {
      // Día registrado y falla -> racha rota
      break;
    }
  }
  return { count: count, broken: false };
}

// Detectar si la racha se rompió "recientemente" (hoy o ayer) para mostrar
// el mensaje "empieza de nuevo" durante 24h.
// Devuelve true si:
//   - hoy hay registro y falla
//   - ayer hubo registro y falla, y hoy aún no se ha registrado nada
function trunkBrokenRecently(trunkId){
  var todayKey = dateKey(today);
  var todayDaily = dailyCache[todayKey];
  if(todayDaily && dayRegisteredForTrunk(todayDaily, trunkId) && !dayPassesTrunk(todayDaily, sleepCache[todayKey], trunkId)){
    return true;
  }
  // Ayer
  var y = new Date(today); y.setDate(today.getDate()-1);
  var yKey = dateKey(y);
  var yDaily = dailyCache[yKey];
  if(yDaily && dayRegisteredForTrunk(yDaily, trunkId) && !dayPassesTrunk(yDaily, sleepCache[yKey], trunkId)){
    // Sólo mostramos "empieza de nuevo" si hoy aún no hay registro positivo
    if(!todayDaily || !dayPassesTrunk(todayDaily, sleepCache[todayKey], trunkId)){
      return true;
    }
  }
  return false;
}

// Calcular "X de los últimos 7 días" para mostrar en cada core card
function lastNFrequency(coreId, threshold, n){
  var ok = 0, registered = 0;
  for(var i=0;i<n;i++){
    var d = new Date(today);
    d.setDate(today.getDate() - i);
    var k = dateKey(d);
    var daily = dailyCache[k];
    if(!daily) continue;
    var v = daily[coreId] || 0;
    if(v > 0 || dayHasAnyMark(daily)){ registered++; }
    if(v >= threshold) ok++;
  }
  return { ok: ok, total: n };
}

function setSync(s){ document.getElementById('sync-dot').className = 'sync-dot ' + s; }
// dateKey usa HORA LOCAL (no UTC) para evitar desfases de zona horaria.
// toISOString convierte a UTC, lo que en España (UTC+1/+2) produce el día anterior
// si la hora local está entre 00:00 y 01:00 o 02:00.
function dateKey(d){
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var dd = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + dd;
}
// Construye un Date a partir de un string 'YYYY-MM-DD' interpretándolo como hora LOCAL al mediodía.
// Esto garantiza que getDate(), getMonth(), getDay() devuelvan el día correcto sin
// ambigüedad por zona horaria.
function parseLocalDate(str){
  var parts = str.split('-');
  return new Date(parseInt(parts[0],10), parseInt(parts[1],10)-1, parseInt(parts[2],10), 12, 0, 0);
}
function getDateForDow(dow){
  // Devuelve la fecha de un día específico (0=dom..6=sab) en la semana navegada actualmente.
  // Calculamos desde el LUNES de la semana navegada para evitar ambigüedad con el domingo.
  var monday = weekStart(today);
  monday.setDate(monday.getDate() + 7*weekOffset);
  // Mapeo: lun=1, mar=2, mie=3, jue=4, vie=5, sab=6, dom=0(→7)
  var offsetFromMonday = dow === 0 ? 6 : dow - 1;
  var d = new Date(monday);
  d.setDate(monday.getDate() + offsetFromMonday);
  return d;
}
function weekStart(d){
  // Lunes como inicio (ISO)
  var x = new Date(d);
  var dow = x.getDay();
  var diff = (dow + 6) % 7;
  x.setDate(x.getDate() - diff);
  x.setHours(0,0,0,0);
  return x;
}
function weekStartKey(d){ return dateKey(weekStart(d)); }
function fmtHours(h){
  var hrs = Math.floor(h);
  var mins = Math.round((h - hrs) * 60);
  return mins === 0 ? hrs + 'h' : hrs + "h" + String(mins).padStart(2,'0');
}
function getWeekDays(){
  var monday = weekStart(today);
  var arr = [];
  for(var i=0;i<7;i++){
    var d = new Date(monday);
    d.setDate(monday.getDate()+i);
    arr.push(d);
  }
  return arr;
}
// Días de una semana arbitraria (con offset respecto a la actual).
function getWeekDaysWithOffset(offset){
  var monday = weekStart(today);
  monday.setDate(monday.getDate() + 7*offset);
  var arr = [];
  for(var i=0;i<7;i++){

    d.setDate(monday.getDate()+i);
    arr.push(d);
  }
  return arr;
}
// ¿Es una fecha editable? Hoy y los últimos MAX_DAYS_BACK días.
// Días futuros no editables tampoco.
function isDateEditable(d){
  var todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 12, 0, 0);
  var dMid = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 12, 0, 0);
  var diff = Math.round((todayMid - dMid) / 86400000);
  return diff >= 0 && diff <= MAX_DAYS_BACK;
}
function dowFromMonday(jsDow){ return (jsDow + 6) % 7; } // 0=lun..6=dom

function computeScore(daily, sleep){
  if(!daily) return 0;
  // Base + mantenimiento (suma a la base, ±1 por hábito, max ±5)
  var maintSum = 0;
  MAINT.forEach(function(m){
    var v = daily[m.id] || 0;
    maintSum += (v > 0 ? 1 : v < 0 ? -1 : 0);
  });
  var s = BASE + maintSum; // rango 15..25
  // Core systems con mapeo por puntos manual
  CORE.forEach(function(c){
    var v = daily[c.id] || 0;
    var idx = c.scale.indexOf(v);
    if(idx >= 0) s += c.pts[idx];
  });
  // Sueño (curva existente)
  if(sleep && sleep.hours) s += scoreSueno(sleep.hours);
  // Móvil (penalización)
  s += scoreMovil(daily.movil_horas || 0);
  // Clampear: mínimo 0, máximo 100
  if(s < 0) s = 0;
  if(s > 100) s = 100;
  return s;
}

function avgLastNDays(n, endDate){
  endDate = endDate || today;
  var sum = 0, count = 0;
  for(var i=0;i<n;i++){
    var d = new Date(endDate);
    d.setDate(endDate.getDate() - i);
    var k = dateKey(d);
    if(dailyCache[k]){
      sum += dailyCache[k].score_total || 0;
      count++;
    }
  }
  return count > 0 ? sum / count : null;
}

function avgWeek(weeksAgo){
  // weeksAgo=0 -> esta semana; 1 -> pasada; etc
  var monday = weekStart(today);
  monday.setDate(monday.getDate() - 7*weeksAgo);
  var sum = 0, count = 0;
  for(var i=0;i<7;i++){
    var d = new Date(monday);
    d.setDate(monday.getDate()+i);
    if(d > today) break;
    var k = dateKey(d);
    if(dailyCache[k]){
      sum += dailyCache[k].score_total || 0;
      count++;
    }
  }
  return count > 0 ? sum / count : null;
}

function renderStreaks(){

  bar.innerHTML = '';
  TRUNK.forEach(function(t){

    var alive = streak.count > 0;
    var card = document.createElement('div');
    var cls = 'streak-card';
    if(alive) cls += ' alive';
    else if(brokenRecently) cls += ' broken';
    else cls += ' zero';
    card.className = cls;

    var subText = '';
    if(brokenRecently && streak.count === 0){
      subText = 'Empieza de nuevo';
    } else {
      subText = t.desc;
    }

    card.innerHTML =
      '<div class="streak-name">' + t.name + '</div>' +
      '<div><span class="streak-count">' + streak.count + '</span><span class="streak-unit">días</span></div>' +
      '<div class="streak-sub">' + subText + '</div>';
    bar.appendChild(card);
  });
}

function renderHero(){

  }
  setCompare('cmp-1w', thisWk, lastWk);
  setCompare('cmp-4w', thisWk, fourWk);
}

function renderBet(){
  var wk = weekStartKey(today);
  var bet = betsCache[wk];
  var card = document.getElementById('bet-card');
  if(!bet){
    card.classList.add('empty');
    document.getElementById('bet-progress-text').textContent = '';
    document.getElementById('bet-text').className = 'bet-text placeholder';
    document.getElementById('bet-text').textContent = 'Toca para definir tu apuesta de esta semana';
    document.getElementById('bet-bar-fg').style.width = '0%';
    card.onclick = function(){ openBetModal(); };
    return;
  }
  card.classList.remove('empty');
  document.getElementById('bet-progress-text').textContent = bet.meta_progreso + ' / ' + bet.meta_objetivo;
  document.getElementById('bet-text').className = 'bet-text';
  document.getElementById('bet-text').textContent = bet.texto;
  var pct = Math.min(100, Math.round(bet.meta_progreso / bet.meta_objetivo * 100));
  document.getElementById('bet-bar-fg').style.width = pct + '%';
  card.onclick = function(){
    // Toque incrementa progreso (long press para decrementar mejor en futuro)
    if(bet.meta_progreso < bet.meta_objetivo){
      updateBetProgress(wk, 1).then(function(){ renderBet(); });
      showToast('+1 progreso');
    } else {
      // Si está completa, permite resetear o bajar
      if(confirm('Apuesta completada. ¿Quitar 1 al progreso?')){
        updateBetProgress(wk, -1).then(function(){ renderBet(); });
      }
    }
  };
}

function renderWeekNav(){
  var nav = document.getElementById('week-nav');
  if(!nav){
    nav = document.createElement('div');
    nav.className = 'week-nav';
    nav.id = 'week-nav';
    document.getElementById('view-hoy').prepend(nav);
  }
  // Etiqueta de la semana
  var monday = weekStart(today);
  monday.setDate(monday.getDate() + 7*weekOffset);
  var sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
  var rangeStr;
  if(weekOffset === 0){
    rangeStr = 'Esta semana';
  } else {
    rangeStr = monday.getDate() + ' ' + monday.toLocaleDateString('es-ES',{month:'short'}) +
               ' — ' + sunday.getDate() + ' ' + sunday.toLocaleDateString('es-ES',{month:'short'});
  }
  // Determinar si se puede ir más atrás. Solo dejamos ir tan atrás como MAX_DAYS_BACK lo permita.
  // El lunes de la semana actual está a (today.getDay()+6)%7 días atrás.
  // Si vamos a la semana anterior, el último editable es el domingo de esa semana = 1 día antes del lunes actual.
  // Para ir más atrás de eso, hay que comprobar que algún día de esa semana sigue siendo editable.
  var prevMon = new Date(monday); prevMon.setDate(monday.getDate()-7);
  var prevSun = new Date(prevMon); prevSun.setDate(prevMon.getDate()+6);
  var canGoBack = isDateEditable(prevSun); // si el último día de la semana anterior aún es editable
  var canGoForward = weekOffset < 0;

  nav.innerHTML =
    '<button class="week-nav-arrow" id="week-prev"' + (canGoBack ? '' : ' disabled') + '>←</button>' +
    '<span class="week-nav-label' + (weekOffset < 0 ? ' past' : '') + '">' + rangeStr + '</span>' +
    '<button class="week-nav-arrow" id="week-next"' + (canGoForward ? '' : ' disabled') + '>→</button>';

  document.getElementById('week-prev').addEventListener('click', function(){
    if(!canGoBack) return;
    weekOffset--;
    currentDow = 0; // domingo
    renderHoy();
  });
  document.getElementById('week-next').addEventListener('click', function(){
    if(!canGoForward) return;
    weekOffset++;
    // Al volver a la semana actual seleccionamos hoy. Si vamos a una semana intermedia, domingo.
    if(weekOffset === 0){
      currentDow = today.getDay();
    } else {
      currentDow = 0; // domingo
    }
    renderHoy();
  });
}

function renderCoreSystems(){
  var dayDate = getDateForDow(currentDow);
  var dateStr = dateKey(dayDate);
  var daily = dailyCache[dateStr] || {};
  var sleep = sleepCache[dateStr];
  var editable = isDateEditable(dayDate);

  var container = document.createElement('div');
  container.id = 'core-container';
  document.getElementById('view-hoy').appendChild(container);

  // Sección core
  var lbl = document.createElement('div');
  lbl.className = 'section-label';
  lbl.textContent = 'Core systems';
  container.appendChild(lbl);

  CORE.forEach(function(c){
    var v = daily[c.id] || 0;
    var idx = c.scale.indexOf(v);
    var pts = idx >= 0 ? c.pts[idx] : 0;
    var div = document.createElement('div');
    div.className = 'core-item';
    var ptsCls = pts > 0 ? 'has-pts' : '';

    // Frecuencia X/7 últimos días con umbral según core
    var threshold = c.scale.length === 4 ? 2 : 1; // ≥2 para estudio/cuerpo/orden, ≥1 para puntualidad
    var freq = lastNFrequency(c.id, threshold, 7);
    var freqCls = freq.ok >= 5 ? 'ok' : freq.ok >= 3 ? 'warn' : '';
    var freqLabel = '· ' + freq.ok + '/7';

    div.innerHTML = '<div class="core-top"><span class="core-name">' + c.name +
      '<span class="core-freq ' + freqCls + '">' + freqLabel + '</span></span>' +
      '<span class="core-points ' + ptsCls + '">' + (pts > 0 ? '+' + pts : '0') + ' / ' + c.max + '</span></div>';
    var row = document.createElement('div');
    row.className = 'scale-row';
    c.scale.forEach(function(sv, sidx){
      var b = document.createElement('div');
      var selClass = '';
      if(v === sv){
        if(c.scale.length === 4){ selClass = ' sel-' + sv; }
        else if(c.scale.length === 3){ selClass = sv === 0 ? ' sel-0' : sv === 1 ? ' sel-1' : ' sel-2x'; }
      }
      b.className = 'scale-btn' + selClass + (editable ? '' : ' locked');
      b.innerHTML = '<span class="sv">' + sv + '</span><span class="sl">' + c.labels[sidx] + '</span>';
      b.addEventListener('click', function(){
        if(!editable) return;
        var partial = {};
        partial[c.id] = sv;
        saveDaily(dateStr, partial).then(function(){ renderHoy(); });
      });
      row.appendChild(b);
    });
    div.appendChild(row);
    container.appendChild(div);
  });

  // Sueño (referencia, no editable aquí)
  var sleepDiv = document.createElement('div');
  sleepDiv.className = 'core-item';
  var sleepPts = sleep && sleep.hours ? scoreSueno(sleep.hours) : 0;
  var sptsCls = sleepPts > 0 ? 'has-pts' : '';
  sleepDiv.innerHTML =
    '<div class="core-top"><span class="core-name">Sueño</span>' +
    '<span class="core-points ' + sptsCls + '">' + (sleepPts > 0 ? '+' + sleepPts : '0') + ' / 18</span></div>' +
    '<div class="sleep-ref">' +
      (sleep && sleep.hours ? 'Anoche: <b>' + fmtHours(sleep.hours) + '</b>' : 'Sin registrar') +
      '<a href="#" id="sleep-link">Pestaña Sueño →</a>' +
    '</div>';
  container.appendChild(sleepDiv);
  document.getElementById('sleep-link').addEventListener('click', function(e){
    e.preventDefault();
    goTab('sue');
  });

  // Penalizaciones
  var pLbl = document.createElement('div');
  pLbl.className = 'section-label';
  pLbl.textContent = 'Penalización móvil';
  container.appendChild(pLbl);

  // Móvil
  var movilDiv = document.createElement('div');
  movilDiv.className = 'core-item';
  var movilH = daily.movil_horas || 0;
  var movilPts = scoreMovil(movilH);
  var movilCls = movilPts < 0 ? 'neg-pts' : '';
  var movilValCls = movilH <= 1.5 ? '' : movilH <= 3 ? 'warn' : 'bad';
  movilDiv.innerHTML =
    '<div class="core-top"><span class="core-name">Móvil hoy</span>' +
    '<span class="core-points ' + movilCls + '">' + (movilPts < 0 ? movilPts : '0') + ' / -20</span></div>' +
    '<div class="movil-row">' +
      '<div class="movil-val ' + movilValCls + '" id="movil-val">' + fmtHours(movilH) + '</div>' +
      '<input type="range" class="movil-slider" id="movil-slider" min="0" max="6" step="0.25" value="' + movilH + '"' + (editable ? '' : ' disabled') + '>' +
    '</div>' +
    '<div class="movil-info"><span>Sin penalizar: ≤1h30</span><span>Tope -20: ≥4h</span></div>';
  container.appendChild(movilDiv);
  var slider = document.getElementById('movil-slider');
  var valEl = document.getElementById('movil-val');
  slider.addEventListener('input', function(){
    var h = parseFloat(slider.value);
    valEl.textContent = fmtHours(h);
    valEl.className = 'movil-val ' + (h <= 1.5 ? '' : h <= 3 ? 'warn' : 'bad');
  });
  slider.addEventListener('change', function(){
    var h = parseFloat(slider.value);
    saveDaily(dateStr, { movil_horas: h }).then(function(){ renderHoy(); });
  });

  // Mantenimiento (tri-estado)
  var mLbl = document.createElement('div');
  mLbl.className = 'section-label';
  mLbl.textContent = 'Mantenimiento · ±1 cada uno';
  container.appendChild(mLbl);

  var mGrid = document.createElement('div');
  mGrid.className = 'maint-grid';
  MAINT.forEach(function(m){
    var state = daily[m.id] || 0; // 0=sin marcar, 1=hecho, -1=no hecho
    var item = document.createElement('div');
    var cls = 'maint-item';
    if(state === 1) cls += ' done';
    else if(state === -1) cls += ' fail';
    if(!editable) cls += ' locked';
    item.className = cls;
    item.innerHTML =
      '<div class="maint-check"><svg viewBox="0 0 11 11" fill="none"><polyline points="1.5,5.5 4.5,9 9.5,2.5" stroke="#C0DD97" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>' +
      '<span class="maint-text">' + m.name + '</span>';
    item.addEventListener('click', function(){
      if(!editable) return;
      // Ciclo: 0 (sin marcar) → 1 (hecho) → -1 (no hecho) → 0
      var next;
      if(state === 0) next = 1;
      else if(state === 1) next = -1;
      else next = 0;
      var partial = {};
      partial[m.id] = next;
      saveDaily(dateStr, partial).then(function(){ renderHoy(); });
    });
    mGrid.appendChild(item);
  });
  container.appendChild(mGrid);

  // Botón review (solo si es domingo o si la semana pasada no tiene review)
  renderReviewButton(container);
}

function renderReviewButton(container){
  // Mostrar botón si hoy es domingo, o si la semana pasada no tiene review
  var isSunday = today.getDay() === 0;
  var lastWk = new Date(today);
  lastWk.setDate(today.getDate() - 7);
  var lastWkKey = weekStartKey(lastWk);
  var hasLastReview = !!reviewsCache[lastWkKey];

    var thisWkKey = weekStartKey(today);

      var banner = document.createElement('div');
      banner.className = 'sunday-banner';
      banner.innerHTML =
        '<div class="sunday-banner-top"><span class="sunday-label">Domingo · Toca review</span><span class="sunday-arrow">→</span></div>' +
        '<div class="sunday-text">Cierra la semana, revisa qué ha pasado y define la apuesta de la siguiente.</div>';

  document.getElementById('header-date').textContent = isToday
    ? 'Hoy · ' + d.toLocaleDateString('es-ES',{day:'numeric',month:'long'})
    : d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});

  renderHero();
  renderStreaks();
  renderBet();

  // Limpiamos completamente el view de Hoy y lo construimos en orden:
  // 1. Week nav (← Esta semana →)
  // 2. Days nav (Lun..Dom)
  // 3. Banner de día no editable (si aplica)
  // 4. Core container
  var view = document.getElementById('view-hoy');
  view.innerHTML = '';

  renderDayNav();

  var dateStr = dateKey(d);
  var editable = isDateEditable(d);
  if(!editable){
    var banner = document.createElement('div');
    banner.className = 'locked-banner';
    var dMid = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 12, 0, 0);
    var todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate(), 12, 0, 0);
    var diff = Math.round((todayMid - dMid) / 86400000);
    if(diff > MAX_DAYS_BACK){
      banner.textContent = 'Este día tiene más de ' + MAX_DAYS_BACK + ' días — solo lectura';
    } else if(diff < 0){
      banner.textContent = 'Día en el futuro — no se puede editar';
    }
    view.appendChild(banner);
  }

  renderCoreSystems();
}

// RENDER HISTORIAL

function renderHistorial(){
  var view = document.getElementById('view-his');
  view.innerHTML = '';

  // Récords
  var allDays = Object.values(dailyCache);
  var allBets = Object.values(betsCache);
  var bestDay = allDays.length ? Math.max.apply(null, allDays.map(function(d){return d.score_total||0;})) : 0;

  // Mejor semana (media)
  var weeks = {};
  allDays.forEach(function(d){
    var wk = weekStartKey(parseLocalDate(d.date));
    if(!weeks[wk]) weeks[wk] = [];
    weeks[wk].push(d.score_total || 0);
  });
  var bestWeekAvg = 0;
  Object.values(weeks).forEach(function(arr){
    var avg = arr.reduce(function(s,v){return s+v;},0) / arr.length;
    if(avg > bestWeekAvg) bestWeekAvg = avg;
  });

  var betsCumplidas = allBets.filter(function(b){return b.cumplida===true;}).length;
  var betsTotales = allBets.filter(function(b){return b.cumplida !== null;}).length;

  var rec = document.createElement('div');
  rec.className = 'records-grid';
  rec.innerHTML =
    '<div class="record-card"><div class="record-label">Mejor día</div><div class="record-val">' + bestDay + '</div></div>' +
    '<div class="record-card"><div class="record-label">Mejor sem (media)</div><div class="record-val">' + Math.round(bestWeekAvg) + '</div></div>' +
    '<div class="record-card"><div class="record-label">Apuestas cumplidas</div><div class="record-val">' + betsCumplidas + '<span class="record-sub"> / ' + betsTotales + '</span></div></div>' +
    '<div class="record-card"><div class="record-label">Días registrados</div><div class="record-val">' + allDays.length + '</div></div>';
  view.appendChild(rec);

  // Lista de semanas
  var lbl = document.createElement('div');
  lbl.className = 'section-label';
  lbl.textContent = 'Semanas';
  view.appendChild(lbl);

  // Generar últimas 8 semanas
  var weekKeys = [];
  for(var i=0;i<8;i++){
    var d = new Date(today);
    d.setDate(today.getDate() - 7*i);
    weekKeys.push(weekStartKey(d));
  }

  weekKeys.forEach(function(wk){
    var monday = parseLocalDate(wk);
    var sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
    var rangeStr = monday.getDate() + ' ' + monday.toLocaleDateString('es-ES',{month:'short'}) + ' — ' + sunday.getDate() + ' ' + sunday.toLocaleDateString('es-ES',{month:'short'});

    var scores = [];
    for(var i=0;i<7;i++){
      var d = new Date(monday);
      d.setDate(monday.getDate()+i);
      var k = dateKey(d);
      if(d <= today) scores.push(dailyCache[k] ? dailyCache[k].score_total : null);
      else scores.push(null);
    }
    var validScores = scores.filter(function(s){return s !== null;});
    var avg = validScores.length ? validScores.reduce(function(s,v){return s+v;},0) / validScores.length : 0;

    var bet = betsCache[wk];
    var review = reviewsCache[wk];

    var card = document.createElement('div');
    card.className = 'history-week';

    var top = '<div class="hw-top"><span class="hw-range">' + rangeStr + '</span>' +
      '<span class="hw-avg">' + Math.round(avg) + '</span></div>';

    var daysHtml = '<div class="hw-days">';
    scores.forEach(function(s, idx){
      var cls = s === null ? '' : s >= 70 ? 's-hi' : s >= 40 ? 's-mid' : 's-lo';
      daysHtml += '<div class="hw-day ' + cls + '">' + (s !== null ? s : '·') + '</div>';
    });
    daysHtml += '</div>';

    var betHtml = '';
    if(bet){
      var cmp = bet.cumplida === true ? '<span class="ok">✓ cumplida</span>'
              : bet.cumplida === false ? '<span class="ko">✗ fallada</span>'
              : '<span>en curso · ' + bet.meta_progreso + '/' + bet.meta_objetivo + '</span>';
      betHtml = '<div class="hw-bet"><b>Apuesta:</b> ' + bet.texto + ' — ' + cmp + '</div>';
    }

    card.innerHTML = top + daysHtml + betHtml;
    view.appendChild(card);
  });

  if(!allDays.length){
    var emp = document.createElement('div');
    emp.className = 'empty';
    emp.textContent = 'Empieza a registrar tus días y aquí verás el histórico.';
    view.appendChild(emp);
  }
}

// ════════════════════════════════════════════════════════════
// MODALES
// ════════════════════════════════════════════════════════════
function openBetModal(){
  document.getElementById('bet-input-text').value = '';
  document.getElementById('bet-input-meta').value = 5;
  document.getElementById('ov-bet').classList.add('open');
}

function openReviewModal(weekKey){
  var monday = parseLocalDate(weekKey);
  var sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
  document.getElementById('review-week-range').textContent =
    'Semana del ' + monday.getDate() + ' ' + monday.toLocaleDateString('es-ES',{month:'short'}) +
    ' al ' + sunday.getDate() + ' ' + sunday.toLocaleDateString('es-ES',{month:'short'});

  // Cerrar apuesta de esa semana si existía
  var bet = betsCache[weekKey];
  if(bet && bet.cumplida === null){
    var cumplida = bet.meta_progreso >= bet.meta_objetivo;
    sb('PATCH','weekly_bets?week_start=eq.'+weekKey, { cumplida: cumplida }).catch(function(){});
    bet.cumplida = cumplida;
  }

  document.getElementById('rv-solido').value = '';
  document.getElementById('rv-vendido').value = '';
  document.getElementById('rv-patron').value = '';
  document.getElementById('rv-bet-text').value = '';
  document.getElementById('rv-bet-meta').value = 5;

  document.getElementById('ov-review').classList.add('open');
  document.getElementById('ov-review').dataset.weekKey = weekKey;
}

document.getElementById('bet-cancel').addEventListener('click', function(){
  document.getElementById('ov-bet').classList.remove('open');
});
document.getElementById('bet-save').addEventListener('click', function(){
  var txt = document.getElementById('bet-input-text').value.trim();
  var meta = parseInt(document.getElementById('bet-input-meta').value, 10);
  if(!txt || !meta){ showToast('Completa los dos campos'); return; }
  var wk = weekStartKey(today);
  saveBet(wk, txt, meta).then(function(){
    document.getElementById('ov-bet').classList.remove('open');
    renderHoy();
    showToast('Apuesta guardada');
  });
});
document.getElementById('rv-cancel').addEventListener('click', function(){
  document.getElementById('ov-review').classList.remove('open');
});
document.getElementById('rv-save').addEventListener('click', function(){
  var weekKey = document.getElementById('ov-review').dataset.weekKey;
  var solido = document.getElementById('rv-solido').value.trim();
  var vendido = document.getElementById('rv-vendido').value.trim();
  var patron = document.getElementById('rv-patron').value.trim();
  var betText = document.getElementById('rv-bet-text').value.trim();
  var betMeta = parseInt(document.getElementById('rv-bet-meta').value, 10);

  if(!solido || !vendido){ showToast('Mínimo: sólido y vendido'); return; }

  // Calcular media de la semana
  var monday = parseLocalDate(weekKey);
  var sum = 0, count = 0;
  for(var i=0;i<7;i++){
    var d = new Date(monday); d.setDate(monday.getDate()+i);
    var k = dateKey(d);
    if(dailyCache[k]){ sum += dailyCache[k].score_total || 0; count++; }
  }
  var media = count > 0 ? sum/count : 0;

  saveReview(weekKey, solido, vendido, patron, media).then(function(){
    if(betText && betMeta){
      // Apuesta para la semana SIGUIENTE a la del review
      var next = parseLocalDate(weekKey);
      next.setDate(next.getDate() + 7);
      var nextKey = dateKey(next);
      return saveBet(nextKey, betText, betMeta);
    }
  }).then(function(){
    document.getElementById('ov-review').classList.remove('open');
    renderHoy();
    showToast('Review guardada');
  });
});

document.querySelectorAll('.overlay').forEach(function(el){
  el.addEventListener('click', function(e){
    if(e.target === el) el.classList.remove('open');
  });
});

// TABS
// ════════════════════════════════════════════════════════════
function goTab(t){
  currentTab = t;
  ['hoy','sue','his'].forEach(function(x){
    document.getElementById('view-'+x).style.display = x === t ? 'block' : 'none';
    document.getElementById('tab-'+x).classList.remove('active');
  });
  document.getElementById('tab-'+t).classList.add('active');
  if(t === 'hoy') renderHoy();
  if(t === 'sue') renderSueno();
  if(t === 'his') renderHistorial();
}
document.getElementById('tab-hoy').addEventListener('click', function(){ goTab('hoy'); });
document.getElementById('tab-sue').addEventListener('click', function(){ goTab('sue'); });
document.getElementById('tab-his').addEventListener('click', function(){ goTab('his'); });

// TOAST
// ════════════════════════════════════════════════════════════
var toastT;
function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(function(){ t.classList.remove('show'); }, 1400);
}

for(var i=0;i<60;i++){

});
