<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Estudios">
<title>Plan de Estudios</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f1a;color:#eee;min-height:100vh;padding-bottom:40px}
.app{max-width:420px;margin:0 auto;padding:14px}
.header{background:#1a1a2e;border:1px solid #2c2c4a;border-radius:16px;padding:16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.header-left h1{font-size:18px;font-weight:600;color:#fff}
.header-left p{font-size:12px;color:#888;margin-top:2px}
.header-right{display:flex;align-items:center;gap:10px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#444;flex-shrink:0}
.sync-dot.ok{background:#63991b}.sync-dot.syncing{background:#BA7517;animation:pulse 1s infinite}.sync-dot.err{background:#A32D2D}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.score-pill{background:#0F3460;border:1px solid #185FA5;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:#85B7EB;white-space:nowrap}
.edit-toggle{background:#1a1a2e;border:1px solid #2c2c4a;border-radius:20px;padding:6px 12px;font-size:12px;font-weight:600;color:#888;cursor:pointer}
.edit-toggle.active{border-color:#534AB7;color:#7F77DD;background:#16132a}

.tabs{display:flex;gap:6px;margin-bottom:12px}
.tab{flex:1;padding:9px 4px;background:#1a1a2e;border:1px solid #2c2c4a;border-radius:10px;cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:#666}
.tab.t-day.active{background:#0d1f3a;border-color:#185FA5;color:#85B7EB}
.tab.t-week.active{background:#16132a;border-color:#534AB7;color:#7F77DD}

.days-nav{display:flex;gap:6px;margin-bottom:12px}
.day-btn{flex:1;padding:8px 2px;background:#1a1a2e;border:1px solid #2c2c4a;border-radius:10px;cursor:pointer;text-align:center}
.day-btn.active{background:#0F3460;border-color:#185FA5}
.day-btn .dn{font-size:10px;color:#888;display:block}
.day-btn .dd{font-size:14px;font-weight:600;color:#fff;display:block}
.day-btn.active .dn{color:rgba(133,183,235,0.8)}
.day-btn.active .dd{color:#85B7EB}
.dot{width:5px;height:5px;border-radius:50%;background:#2c2c4a;margin:4px auto 0;display:block}
.day-btn.has-data .dot{background:#378ADD}
.day-btn.active .dot{background:rgba(133,183,235,0.4)}

.day-header{padding:10px 0 8px;display:flex;align-items:center;justify-content:space-between}
.day-title{font-size:15px;font-weight:600;color:#fff}
.day-progress{font-size:12px;color:#888}

.block-card{background:#1a1a2e;border:1px solid #2c2c4a;border-radius:14px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.block-card.done{border-color:#0F3460}
.block-card.is-class{border-left:3px solid #534AB7}
.block-card.editing{border-color:#534AB7}

.block-main{padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.block-main:active{background:#16213e}
.block-info{flex:1;min-width:0}
.block-time{font-size:11px;color:#888;margin-bottom:3px;font-weight:500}
.block-task{font-size:13px;color:#ccc;line-height:1.35}
.block-card.done .block-task{color:#888;text-decoration:line-through;text-decoration-color:#444}
.class-badge{display:inline-block;font-size:9px;background:#16132a;color:#7F77DD;border-radius:4px;padding:1px 5px;margin-left:5px;font-weight:600;vertical-align:middle}
.subj-badge{display:inline-block;font-size:9px;border-radius:4px;padding:1px 5px;margin-left:5px;font-weight:600;vertical-align:middle}
.minutes-badge{display:inline-block;font-size:10px;color:#85B7EB;background:#0d1f3a;border-radius:4px;padding:1px 6px;margin-left:5px;font-weight:600;vertical-align:middle}

.check-box{width:26px;height:26px;border-radius:50%;border:1.5px solid #444;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.check-box.done{background:#0F3460;border-color:#185FA5}
.check-icon{display:none;width:13px;height:13px}
.check-box.done .check-icon{display:block}

.block-actions{display:flex;gap:6px;flex-shrink:0}
.btn-edit{background:none;border:1px solid #2c2c4a;border-radius:6px;color:#666;font-size:12px;padding:4px 8px;cursor:pointer}
.btn-edit:active{color:#7F77DD;border-color:#534AB7}
.btn-del{background:none;border:1px solid #2c2c4a;border-radius:6px;color:#666;font-size:14px;padding:4px 8px;cursor:pointer}
.btn-del:active{color:#f09595;border-color:#A32D2D}

.edit-area{padding:0 14px 14px;display:none}
.block-card.open .edit-area{display:block}
.edit-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.edit-input{flex:1;background:#0d0d1a;border:1px solid #2c2c4a;border-radius:8px;padding:8px 10px;font-size:13px;color:#eee;font-family:inherit;outline:none}
.edit-input:focus{border-color:#185FA5}
.edit-input.time-input{max-width:130px;flex:none}
.edit-input.min-input{max-width:90px;flex:none}
.edit-select{background:#0d0d1a;border:1px solid #2c2c4a;border-radius:8px;padding:8px 10px;font-size:13px;color:#eee;font-family:inherit;outline:none;flex:1}
.edit-save{padding:8px 16px;background:#0F3460;border:1px solid #185FA5;border-radius:8px;color:#85B7EB;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.class-toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:#888;margin-bottom:8px}
.class-toggle input{accent-color:#534AB7;width:16px;height:16px}
.edit-label{font-size:10px;color:#555;margin-right:4px;text-transform:uppercase;letter-spacing:.3px}

.note-area{padding:0 14px 12px;display:none}
.block-card.note-open .note-area{display:block}
.note-input{width:100%;background:#0d0d1a;border:1px solid #2c2c4a;border-radius:8px;padding:8px 10px;font-size:12px;color:#aaa;font-family:inherit;resize:none;outline:none;min-height:52px}
.note-input:focus{border-color:#185FA5}
.note-label{font-size:10px;color:#555;margin-bottom:5px;display:flex;justify-content:space-between}
.note-saved{font-size:10px;color:#378ADD;opacity:0;transition:opacity .3s}
.note-saved.show{opacity:1}

.add-block-btn{width:100%;padding:13px;background:#16132a;border:1px dashed #534AB7;border-radius:12px;color:#7F77DD;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;display:none}
.add-block-btn.visible{display:block}
.empty-day{text-align:center;padding:40px 20px;color:#444;font-size:13px;line-height:1.8}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:#1a1a2e;border-radius:20px 20px 0 0;border-top:1px solid #2c2c4a;padding:20px;width:100%;max-width:420px}
.sheet h3{font-size:16px;font-weight:600;color:#fff;margin-bottom:6px}
.sheet p{font-size:12px;color:#888;margin-bottom:14px}
.min-quick{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.min-chip{padding:10px 4px;background:#0d0d1a;border:1px solid #2c2c4a;border-radius:8px;cursor:pointer;text-align:center;font-size:13px;font-weight:600;color:#888}
.min-chip:active{border-color:#185FA5;color:#85B7EB;background:#0d1f3a}
.min-chip.sel{border-color:#185FA5;color:#85B7EB;background:#0d1f3a}
.min-input-wrap{margin-bottom:14px}
.min-input-wrap label{font-size:11px;color:#666;display:block;margin-bottom:5px}
.min-input-wrap input{width:100%;background:#0d0d1a;border:1px solid #2c2c4a;border-radius:8px;padding:11px 12px;font-size:16px;color:#eee;font-family:inherit;outline:none}
.min-input-wrap input:focus{border-color:#185FA5}
.sheet-btns{display:flex;gap:8px}
.btn-cancel{flex:1;padding:12px;background:#2c2c4a;border:none;border-radius:10px;color:#888;font-size:14px;font-weight:600;cursor:pointer}
.btn-confirm{flex:2;padding:12px;background:#0F3460;border:1px solid #185FA5;border-radius:10px;color:#85B7EB;font-size:14px;font-weight:600;cursor:pointer}

.week-card{background:#1a1a2e;border:1px solid #2c2c4a;border-radius:14px;padding:14px;margin-bottom:10px}
.week-card-title{font-size:13px;font-weight:600;color:#fff;margin-bottom:10px}
.subj-row{margin-bottom:11px}
.subj-row:last-child{margin-bottom:0}
.subj-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.subj-name{font-size:13px;font-weight:600}
.subj-name .ok-mark{color:#63991b;margin-left:4px;font-size:11px}
.subj-amount{font-size:11px;color:#888}
.subj-amount.done{color:#C0DD97}
.subj-bar-bg{background:#0d0d1a;border-radius:4px;height:7px;overflow:hidden}
.subj-bar-fg{height:7px;border-radius:4px;transition:width .4s}
.week-totals{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
.totals-card{background:#0d0d1a;border-radius:10px;padding:10px;text-align:center}
.totals-label{font-size:9px;color:#666;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.totals-val{font-size:15px;font-weight:700;color:#85B7EB}
.totals-val.green{color:#C0DD97}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#eee;color:#111;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <h1>Plan de estudios</h1>
      <p id="header-date"></p>
    </div>
    <div class="header-right">
      <div class="sync-dot" id="sync-dot"></div>
      <button class="edit-toggle" id="edit-toggle">Editar</button>
      <div class="score-pill" id="score-pill">0 / 0</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab t-day active" id="tab-day">Dia</div>
    <div class="tab t-week" id="tab-week">Semana</div>
  </div>

  <div id="view-day">
    <div class="days-nav" id="days-nav"></div>
    <div class="day-header">
      <span class="day-title" id="day-title"></span>
      <span class="day-progress" id="day-progress"></span>
    </div>
    <div id="blocks-container"></div>
    <button class="add-block-btn" id="add-block-btn">+ Añadir bloque</button>
  </div>

  <div id="view-week" style="display:none"></div>
</div>

<div class="overlay" id="sh-min">
  <div class="sheet">
    <h3>¿Cuanto has estudiado?</h3>
    <p id="min-task-label"></p>
    <div class="min-quick" id="min-quick"></div>
    <div class="min-input-wrap">
      <label>O introducelo manualmente (minutos)</label>
      <input type="number" inputmode="numeric" id="min-input" placeholder="0">
    </div>
    <div class="sheet-btns">
      <button class="btn-cancel" id="min-cancel">Cancelar</button>
      <button class="btn-confirm" id="min-confirm">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SB_URL = 'https://jqmfbodxyidnwnvqfjfh.supabase.co';
var SB_KEY = 'sb_publishable_VzI9uNGpvzXuK3ZIodJCNw_H39Ri-ey';

var SUBJECTS = [
  {id:'ININ', label:'ININ', goal:600, color:'#A32D2D', bg:'rgba(163,45,45,0.15)'},
  {id:'INEL', label:'INEL', goal:240, color:'#BA7517', bg:'rgba(186,117,23,0.15)'},
  {id:'ENCO', label:'ENCO', goal:180, color:'#3B6D11', bg:'rgba(59,109,17,0.15)'},
  {id:'ELPO', label:'ELPO', goal:120, color:'#185FA5', bg:'rgba(24,95,165,0.15)'},
  {id:'SIRO', label:'SIRO', goal:60,  color:'#534AB7', bg:'rgba(83,74,183,0.15)'}
];

function getSubject(id){ return SUBJECTS.find(function(s){return s.id===id;}); }
function fmtHours(mins){
  if(!mins) return '0h';
  var h = Math.floor(mins/60); var m = mins%60;
  if(h===0) return m+'min';
  if(m===0) return h+'h';
  return h+'h'+(m<10?'0':'')+m;
}

var DEFAULT_BLOCKS = [
  {day:'mar', block_idx:10, time:'17:00 - 19:00', task:'ENCO - Clase Teoria',   is_class:true, subject:'ENCO'},
  {day:'mar', block_idx:11, time:'19:00 - 21:00', task:'ENCO - Clase Practica', is_class:true, subject:'ENCO'},
  {day:'mie', block_idx:10, time:'15:00 - 17:00', task:'SIRO - Clase Teoria',   is_class:true, subject:'SIRO'},
  {day:'mie', block_idx:11, time:'17:00 - 19:00', task:'ININ - Clase Practica', is_class:true, subject:'ININ'},
  {day:'jue', block_idx:10, time:'15:00 - 17:00', task:'INEL - Clase Teoria',   is_class:true, subject:'INEL'},
  {day:'jue', block_idx:11, time:'17:00 - 19:00', task:'INEL - Clase Practica', is_class:true, subject:'INEL'},
  {day:'jue', block_idx:12, time:'19:00 - 21:00', task:'SIRO - Clase Practica', is_class:true, subject:'SIRO'},
  {day:'vie', block_idx:10, time:'15:00 - 17:00', task:'ININ - Clase Teoria',   is_class:true, subject:'ININ'}
];

var DAYS_LABEL = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
var DAYS_KEY   = ['dom','lun','mar','mie','jue','vie','sab'];
var DAYS_FULL  = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
var today = new Date();
var currentDow = today.getDay();
var currentTab = 'day';
var editMode = false;
var blocksCache = {};
var logsCache = {};
var pendingLog = null;

function setSyncStatus(s){ document.getElementById('sync-dot').className='sync-dot '+s; }

function dateKey(d){
  var dt = new Date(today);
  dt.setDate(today.getDate() - (today.getDay() - d));
  return dt.toISOString().slice(0,10);
}

function sbReq(method, path, body){
  return fetch(SB_URL+'/rest/v1/'+path,{
    method: method,
    headers:{
      'apikey': SB_KEY, 'Authorization': 'Bearer '+SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': method==='POST' ? 'return=representation,resolution=merge-duplicates' : method==='PATCH' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r){ return r.status===204 ? null : r.json(); });
}

function loadAll(){
  setSyncStatus('syncing');
  var p1 = sbReq('GET','study_blocks?order=block_idx.asc&select=*');
  var dates = [];
  for(var i=0;i<7;i++) dates.push(dateKey(i));
  var p2 = sbReq('GET','study_logs?date=in.('+dates.join(',')+')'+'&select=*');
  return Promise.all([p1,p2]).then(function(res){
    blocksCache = {};
    logsCache = {};
    if(Array.isArray(res[0])) res[0].forEach(function(b){
      if(!blocksCache[b.day]) blocksCache[b.day]=[];
      blocksCache[b.day].push(b);
    });
    if(Array.isArray(res[1])) res[1].forEach(function(r){
      var k = r.day+'_'+r.block_idx+'_'+r.date;
      logsCache[k] = {done:r.done, note:r.note||'', minutes:r.minutes||0, id:r.id};
    });
    setSyncStatus('ok');
  }).catch(function(){ setSyncStatus('err'); });
}

function getDayBlocks(dow){
  var day = DAYS_KEY[dow];
  var blocks = (blocksCache[day]||[]).slice();
  blocks.sort(function(a,b){ return a.block_idx - b.block_idx; });
  return blocks;
}

function getLogKey(dow, blockIdx){
  return DAYS_KEY[dow]+'_'+blockIdx+'_'+dateKey(dow);
}

function getDayDone(dow){
  var blocks = getDayBlocks(dow);
  var done = 0;
  blocks.forEach(function(b){
    var k = getLogKey(dow, b.block_idx);
    if(logsCache[k] && logsCache[k].done) done++;
  });
  return {done:done, total:blocks.length};
}

function getWeekMinutesBySubject(){
  var totals = {};
  SUBJECTS.forEach(function(s){ totals[s.id]={subjMin:0}; });
  var allTotal = 0;

  Object.keys(blocksCache).forEach(function(day){
    blocksCache[day].forEach(function(b){
      var dow = DAYS_KEY.indexOf(b.day);
      if(dow<0) return;
      var k = getLogKey(dow, b.block_idx);
      var log = logsCache[k];
      if(!log || !log.done) return;
      var mins = log.minutes || 0;
      allTotal += mins;
      if(!b.is_class && b.subject && totals[b.subject]){
        totals[b.subject].subjMin += mins;
      }
    });
  });
  totals._total = allTotal;
  return totals;
}

function saveLog(dow, blockIdx, done, note, minutes){
  setSyncStatus('syncing');
  var day = DAYS_KEY[dow];
  var date = dateKey(dow);
  var k = getLogKey(dow, blockIdx);
  var body = {day:day, block_idx:blockIdx, date:date, done:done, note:note||'', minutes:minutes||0};
  return sbReq('POST','study_logs',body).then(function(res){
    var r = Array.isArray(res)?res[0]:res;
    if(r) logsCache[k] = {done:r.done, note:r.note||'', minutes:r.minutes||0, id:r.id};
    else logsCache[k] = {done:done, note:note||'', minutes:minutes||0};
    setSyncStatus('ok');
  }).catch(function(){ setSyncStatus('err'); showToast('Error de conexion'); });
}

function addBlock(dow){
  setSyncStatus('syncing');
  var day = DAYS_KEY[dow];
  var blocks = getDayBlocks(dow);
  var maxIdx = blocks.length>0 ? Math.max.apply(null, blocks.map(function(b){return b.block_idx;})) : -1;
  var nextIdx = maxIdx + 1;
  var body = {day:day, block_idx:nextIdx, time:'', task:'', is_class:false, subject:null, default_minutes:60};
  return sbReq('POST','study_blocks',body).then(function(res){
    var nb = Array.isArray(res)?res[0]:res;
    if(nb){ if(!blocksCache[day]) blocksCache[day]=[]; blocksCache[day].push(nb); }
    setSyncStatus('ok');
    render();
    showToast('Bloque añadido');
  }).catch(function(){ setSyncStatus('err'); });
}

function updateBlock(id, fields){
  setSyncStatus('syncing');
  return sbReq('PATCH','study_blocks?id=eq.'+id, fields).then(function(){
    Object.keys(blocksCache).forEach(function(day){
      blocksCache[day] = blocksCache[day].map(function(b){
        return b.id===id ? Object.assign({},b,fields) : b;
      });
    });
    setSyncStatus('ok');
    render();
    showToast('Guardado');
  }).catch(function(){ setSyncStatus('err'); });
}

function deleteBlock(id, dow){
  setSyncStatus('syncing');
  var day = DAYS_KEY[dow];
  return sbReq('DELETE','study_blocks?id=eq.'+id).then(function(){
    blocksCache[day] = (blocksCache[day]||[]).filter(function(b){return b.id!==id;});
    setSyncStatus('ok');
    render();
    showToast('Bloque eliminado');
  }).catch(function(){ setSyncStatus('err'); });
}

function openMinOverlay(dow, block){
  pendingLog = {dow:dow, block:block};
  var startMins = block.default_minutes || 60;
  document.getElementById('min-task-label').textContent =
    (block.subject ? block.subject+' - ' : '') + (block.task || 'Bloque sin titulo');
  document.getElementById('min-input').value = startMins;
  buildMinQuick(startMins);
  document.getElementById('sh-min').classList.add('open');
}

function buildMinQuick(selected){
  var wrap = document.getElementById('min-quick');
  wrap.innerHTML = '';
  [30,45,60,90,120,150,180,240].forEach(function(mins){
    var chip = document.createElement('div');
    chip.className = 'min-chip'+(selected===mins?' sel':'');
    chip.textContent = fmtHours(mins);
    chip.addEventListener('click', function(){
      document.getElementById('min-input').value = mins;
      buildMinQuick(mins);
    });
    wrap.appendChild(chip);
  });
}

function closeMinOverlay(){ document.getElementById('sh-min').classList.remove('open'); pendingLog=null; }

document.getElementById('min-cancel').addEventListener('click', closeMinOverlay);
document.getElementById('min-input').addEventListener('input', function(){
  var v = parseInt(this.value)||0;
  buildMinQuick(v);
});
document.getElementById('min-confirm').addEventListener('click', function(){
  if(!pendingLog) return;
  var mins = parseInt(document.getElementById('min-input').value)||0;
  if(mins<0) mins = 0;
  var blk = pendingLog.block;
  var dow = pendingLog.dow;
  var k = getLogKey(dow, blk.block_idx);
  var existingNote = (logsCache[k]||{}).note || '';
  saveLog(dow, blk.block_idx, true, existingNote, mins).then(function(){
    closeMinOverlay();
    render();
    showToast('Completado · '+fmtHours(mins));
  });
});
document.getElementById('sh-min').addEventListener('click', function(e){
  if(e.target===this) closeMinOverlay();
});

function renderNav(){
  var nav = document.getElementById('days-nav');
  nav.innerHTML = '';
  DAYS_LABEL.forEach(function(label, dow){
    var sc = getDayDone(dow);
    var blocks = getDayBlocks(dow);
    var b = document.createElement('div');
    b.className = 'day-btn'+(dow===currentDow?' active':'')+(sc.done>0?' has-data':'');
    var d = new Date(today); d.setDate(today.getDate()-(today.getDay()-dow));
    b.innerHTML = '<span class="dn">'+label+'</span><span class="dd">'+d.getDate()+'</span><span class="dot"></span>';
    if(!blocks.length && !editMode) b.style.opacity='0.35';
    b.addEventListener('click', function(){ currentDow=dow; render(); });
    nav.appendChild(b);
  });
}

function renderBlocks(){
  var dow = currentDow;
  var blocks = getDayBlocks(dow);
  var container = document.getElementById('blocks-container');
  container.innerHTML = '';

  document.getElementById('day-title').textContent = DAYS_FULL[dow];
  document.getElementById('add-block-btn').className = 'add-block-btn'+(editMode?' visible':'');

  if(!blocks.length){
    var emp = document.createElement('div');
    emp.className = 'empty-day';
    emp.textContent = editMode ? 'Sin bloques. Pulsa + Añadir bloque.' : 'Sin bloques para este dia';
    container.appendChild(emp);
    document.getElementById('day-progress').textContent = '';
    document.getElementById('score-pill').textContent = '— / —';
    return;
  }

  var sc = getDayDone(dow);
  document.getElementById('day-progress').textContent = sc.done+' de '+sc.total+' completados';
  document.getElementById('score-pill').textContent = sc.done+' / '+sc.total;

  blocks.forEach(function(block){
    var logKey = getLogKey(dow, block.block_idx);
    var data = logsCache[logKey]||{done:false, note:'', minutes:0};
    var isClass = block.is_class;
    var subj = block.subject ? getSubject(block.subject) : null;

    var card = document.createElement('div');
    card.className = 'block-card'+(data.done?' done':'')+(isClass?' is-class':'');

    var main = document.createElement('div');
    main.className = 'block-main';

    var checkBox = document.createElement('div');
    checkBox.className = 'check-box'+(data.done?' done':'');
    checkBox.innerHTML = '<svg class="check-icon" viewBox="0 0 13 13" fill="none"><polyline points="2,6.5 5,10 11,3" stroke="#85B7EB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

    var info = document.createElement('div');
    info.className = 'block-info';
    var taskHtml = (block.task||'<span style="color:#555;font-style:italic">Sin tarea</span>');
    if(subj && !isClass){
      taskHtml += '<span class="subj-badge" style="background:'+subj.bg+';color:'+subj.color+'">'+subj.label+'</span>';
    }
    if(isClass) taskHtml += '<span class="class-badge">Clase</span>';
    if(data.done && data.minutes>0) taskHtml += '<span class="minutes-badge">'+fmtHours(data.minutes)+'</span>';
    info.innerHTML = '<div class="block-time">'+(block.time||'Sin hora')+'</div><div class="block-task">'+taskHtml+'</div>';

    main.appendChild(checkBox);
    main.appendChild(info);

    if(editMode){
      var actions = document.createElement('div');
      actions.className = 'block-actions';
      var btnEdit = document.createElement('button');
      btnEdit.className = 'btn-edit'; btnEdit.textContent = 'Editar';
      var btnDel = document.createElement('button');
      btnDel.className = 'btn-del'; btnDel.textContent = '×';
      actions.appendChild(btnEdit);
      actions.appendChild(btnDel);
      main.appendChild(actions);

      var editArea = document.createElement('div');
      editArea.className = 'edit-area';

      var classToggle = document.createElement('label');
      classToggle.className = 'class-toggle';
      var chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.checked = !!isClass;
      classToggle.appendChild(chk);
      classToggle.appendChild(document.createTextNode('Clase fija (no cuenta para el objetivo)'));

      var timeRow = document.createElement('div');
      timeRow.className = 'edit-row';
      var timeInput = document.createElement('input');
      timeInput.className = 'edit-input time-input';
      timeInput.placeholder = 'Ej: 10:00 - 14:00';
      timeInput.value = block.time||'';
      timeRow.appendChild(timeInput);

      var taskRow = document.createElement('div');
      taskRow.className = 'edit-row';
      var taskInput = document.createElement('input');
      taskInput.className = 'edit-input';
      taskInput.placeholder = 'Tarea o asunto...';
      taskInput.value = block.task||'';
      taskRow.appendChild(taskInput);

      var subjRow = document.createElement('div');
      subjRow.className = 'edit-row';
      var subjLbl = document.createElement('span');
      subjLbl.className = 'edit-label'; subjLbl.textContent='Asig';
      var subjSelect = document.createElement('select');
      subjSelect.className = 'edit-select';
      var optNone = document.createElement('option');
      optNone.value=''; optNone.textContent='— ninguna —';
      if(!block.subject) optNone.selected=true;
      subjSelect.appendChild(optNone);
      SUBJECTS.forEach(function(s){
        var opt=document.createElement('option');
        opt.value=s.id; opt.textContent=s.label;
        if(block.subject===s.id) opt.selected=true;
        subjSelect.appendChild(opt);
      });
      var minLbl = document.createElement('span');
      minLbl.className = 'edit-label'; minLbl.textContent='Min';
      var minInput = document.createElement('input');
      minInput.className='edit-input min-input';
      minInput.type='number';
      minInput.placeholder='60';
      minInput.value = block.default_minutes || '';
      subjRow.appendChild(subjLbl);
      subjRow.appendChild(subjSelect);
      subjRow.appendChild(minLbl);
      subjRow.appendChild(minInput);

      var saveRow = document.createElement('div');
      saveRow.className = 'edit-row';
      saveRow.style.justifyContent='flex-end';
      var saveBtn = document.createElement('button');
      saveBtn.className = 'edit-save';
      saveBtn.textContent = 'Guardar';
      saveRow.appendChild(saveBtn);

      editArea.appendChild(classToggle);
      editArea.appendChild(timeRow);
      editArea.appendChild(taskRow);
      editArea.appendChild(subjRow);
      editArea.appendChild(saveRow);

      btnEdit.addEventListener('click', function(e){
        e.stopPropagation();
        card.classList.toggle('open');
        card.classList.remove('note-open');
      });
      btnDel.addEventListener('click', function(e){
        e.stopPropagation();
        if(btnDel.dataset.confirm==='1'){
          deleteBlock(block.id, dow);
        } else {
          btnDel.dataset.confirm='1';
          btnDel.textContent='Seguro?';
          btnDel.style.color='#f09595';
          btnDel.style.borderColor='#A32D2D';
          setTimeout(function(){
            btnDel.dataset.confirm='';
            btnDel.textContent='x';
            btnDel.style.color='';
            btnDel.style.borderColor='';
          }, 2500);
        }
      });
      saveBtn.addEventListener('click', function(){
        var fields = {
          time: timeInput.value.trim(),
          task: taskInput.value.trim(),
          is_class: chk.checked,
          subject: subjSelect.value || null,
          default_minutes: parseInt(minInput.value)||0
        };
        updateBlock(block.id, fields);
      });

      card.appendChild(main);
      card.appendChild(editArea);
    } else {
      checkBox.addEventListener('click', function(e){
        e.stopPropagation();
        if(!data.done){
          openMinOverlay(dow, block);
        } else {
          var curNote = card.querySelector('.note-input') ? card.querySelector('.note-input').value : data.note;
          saveLog(dow, block.block_idx, false, curNote, 0).then(function(){ render(); });
          showToast('Desmarcado');
        }
      });
      main.addEventListener('click', function(){ card.classList.toggle('note-open'); });

      var noteArea = document.createElement('div');
      noteArea.className = 'note-area';
      var savedId = 'saved_'+dow+'_'+block.block_idx;
      noteArea.innerHTML =
        '<div class="note-label"><span>Nota</span><span class="note-saved" id="'+savedId+'">Guardado</span></div>'+
        '<textarea class="note-input" placeholder="Añade una nota...">'+data.note+'</textarea>';

      card.appendChild(main);
      card.appendChild(noteArea);

      var textarea = noteArea.querySelector('textarea');
      var saveTimer;
      textarea.addEventListener('input', function(){
        clearTimeout(saveTimer);
        saveTimer = setTimeout(function(){
          var savedEl = document.getElementById(savedId);
          saveLog(dow, block.block_idx, data.done, textarea.value, data.minutes||0).then(function(){
            if(savedEl){ savedEl.classList.add('show'); setTimeout(function(){ savedEl.classList.remove('show'); }, 1500); }
          });
        }, 800);
      });
      textarea.addEventListener('click', function(e){ e.stopPropagation(); });
    }

    container.appendChild(card);
  });
}

function renderHeader(){
  var d = new Date(today); d.setDate(today.getDate()-(today.getDay()-currentDow));
  var isToday = currentDow===today.getDay();
  document.getElementById('header-date').textContent = isToday
    ? 'Hoy - '+d.toLocaleDateString('es-ES',{day:'numeric',month:'long'})
    : d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
}

function renderWeek(){
  var view = document.getElementById('view-week');
  view.innerHTML = '';
  var totals = getWeekMinutesBySubject();
  var totalGoal = SUBJECTS.reduce(function(s,sb){return s+sb.goal;},0);
  var totalDone = SUBJECTS.reduce(function(s,sb){return s+(totals[sb.id].subjMin||0);},0);

  var card = document.createElement('div');
  card.className = 'week-card';
  card.innerHTML = '<div class="week-card-title">Esta semana - objetivos sin clases</div>';

  SUBJECTS.forEach(function(sb){
    var done = totals[sb.id].subjMin||0;
    var pct = sb.goal>0 ? Math.min(100, Math.round(done/sb.goal*100)) : 0;
    var amtClass = done>=sb.goal ? 'done' : '';
    var okMark = done>=sb.goal ? '<span class="ok-mark">OK</span>' : '';
    var row = document.createElement('div');
    row.className = 'subj-row';
    row.innerHTML =
      '<div class="subj-top">'+
        '<span class="subj-name" style="color:'+sb.color+'">'+sb.label+okMark+'</span>'+
        '<span class="subj-amount '+amtClass+'">'+fmtHours(done)+' / '+fmtHours(sb.goal)+'</span>'+
      '</div>'+
      '<div class="subj-bar-bg"><div class="subj-bar-fg" style="width:'+pct+'%;background:'+sb.color+'"></div></div>';
    card.appendChild(row);
  });
  view.appendChild(card);

  var totalsCard = document.createElement('div');
  totalsCard.className = 'week-totals';
  totalsCard.innerHTML =
    '<div class="totals-card"><div class="totals-label">Estudiado</div><div class="totals-val '+(totalDone>=totalGoal?'green':'')+'">'+fmtHours(totalDone)+'</div></div>'+
    '<div class="totals-card"><div class="totals-label">Objetivo total</div><div class="totals-val">'+fmtHours(totalGoal)+'</div></div>';
  view.appendChild(totalsCard);

  var hint = document.createElement('div');
  hint.style.cssText = 'text-align:center;font-size:11px;color:#444;margin-top:14px;line-height:1.6';
  hint.textContent = 'Solo cuentan bloques completados que NO sean clases. Las clases se ignoran.';
  view.appendChild(hint);
}

function render(){
  if(currentTab==='day'){
    renderHeader(); renderNav(); renderBlocks();
  } else {
    document.getElementById('header-date').textContent = 'Resumen semanal';
    document.getElementById('score-pill').textContent = '— / —';
    renderWeek();
  }
}

function goTab(t){
  currentTab = t;
  document.getElementById('view-day').style.display = t==='day' ? 'block' : 'none';
  document.getElementById('view-week').style.display = t==='week' ? 'block' : 'none';
  document.getElementById('tab-day').classList.toggle('active', t==='day');
  document.getElementById('tab-week').classList.toggle('active', t==='week');
  render();
}

document.getElementById('tab-day').addEventListener('click', function(){ goTab('day'); });
document.getElementById('tab-week').addEventListener('click', function(){ goTab('week'); });
document.getElementById('edit-toggle').addEventListener('click', function(){
  editMode = !editMode;
  this.textContent = editMode ? 'Listo' : 'Editar';
  this.className = 'edit-toggle'+(editMode?' active':'');
  if(currentTab!=='day') goTab('day');
  else render();
});

document.getElementById('add-block-btn').addEventListener('click', function(){ addBlock(currentDow); });

function seedDefaultsIfEmpty(){
  var allBlocks = Object.values(blocksCache).reduce(function(a,b){return a.concat(b);},[]);
  if(allBlocks.length > 0) return Promise.resolve();
  var inserts = DEFAULT_BLOCKS.map(function(b){
    return {day:b.day, block_idx:b.block_idx, time:b.time, task:b.task, is_class:b.is_class, subject:b.subject, default_minutes:120};
  });
  return fetch(SB_URL+'/rest/v1/study_blocks',{
    method:'POST',
    headers:{
      'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,
      'Content-Type':'application/json',
      'Prefer':'return=representation'
    },
    body:JSON.stringify(inserts)
  }).then(function(r){return r.json();}).then(function(res){
    if(Array.isArray(res)) res.forEach(function(b){
      if(!blocksCache[b.day]) blocksCache[b.day]=[];
      blocksCache[b.day].push(b);
    });
  }).catch(function(){});
}

var toastT;
function showToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove('show'); },1400); }

setSyncStatus('syncing');
loadAll().then(function(){
  return seedDefaultsIfEmpty();
}).then(function(){
  goTab('day');
});
</script>
